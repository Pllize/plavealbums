function buildProxyEntryHTML(albKey, idx, name, qty, paid, delivered) {
  return `<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:4px" id="proxy-row-${albKey}-${idx}">
    <input type="text" placeholder="이름" value="${name}" style="width:80px;font-size:12px;padding:4px 6px" id="proxy-name-${albKey}-${idx}" oninput="recalcProxyQty('${albKey}')">
    <input type="number" min="0" value="${qty}" style="width:56px;font-size:12px;padding:4px 6px" id="proxy-qty-${albKey}-${idx}" oninput="recalcProxyQty('${albKey}')">
    <label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer">
      <input type="checkbox" ${paid?'checked':''} id="proxy-paid-${albKey}-${idx}" style="width:13px;height:13px"> 입금
    </label>
    <label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer">
      <input type="checkbox" ${delivered?'checked':''} id="proxy-deliv-${albKey}-${idx}" style="width:13px;height:13px"> 배송
    </label>
    <button type="button" onclick="removeProxyEntry('${albKey}',${idx})" style="background:none;border:none;color:var(--err);font-size:12px;cursor:pointer;padding:0 2px">✕</button>
  </div>`;
}

function addProxyEntry(albKey) {
  if (!window._proxyCounters) window._proxyCounters = {};
  const idx = window._proxyCounters[albKey] || 0;
  window._proxyCounters[albKey] = idx + 1;
  const container = document.getElementById('proxy-entries-' + albKey);
  if (!container) return;
  const div = document.createElement('div');
  div.innerHTML = buildProxyEntryHTML(albKey, idx, '', 0, false, false);
  container.appendChild(div.firstChild);
  recalcProxyQty(albKey);
}

function removeProxyEntry(albKey, idx) {
  const row = document.getElementById(`proxy-row-${albKey}-${idx}`);
  if (row) row.remove();
  recalcProxyQty(albKey);
}

function recalcProxyQty(albKey) {
  const container = document.getElementById('proxy-entries-' + albKey);
  if (!container) return;
  let total = 0;
  container.querySelectorAll('[id^="proxy-qty-' + albKey + '-"]').forEach(el => {
    total += parseInt(el.value || '0') || 0;
  });
  const label = document.getElementById('proxy-total-' + albKey);
  if (label) label.textContent = total > 0 ? '총 ' + total + '장' : '';
  updatePurchTotal();
}

function collectProxyEntries(albKey) {
  const container = document.getElementById('proxy-entries-' + albKey);
  if (!container) return [];
  const entries = [];
  container.querySelectorAll('[id^="proxy-row-' + albKey + '-"]').forEach(row => {
    const idParts = row.id.split('-');
    const idx = idParts[idParts.length - 1];
    const name = document.getElementById(`proxy-name-${albKey}-${idx}`)?.value?.trim() || '';
    const qty = parseInt(document.getElementById(`proxy-qty-${albKey}-${idx}`)?.value || '0') || 0;
    const paid = document.getElementById(`proxy-paid-${albKey}-${idx}`)?.checked || false;
    const delivered = document.getElementById(`proxy-deliv-${albKey}-${idx}`)?.checked || false;
    if (name || qty > 0) entries.push({ name, qty, paid, delivered });
  });
  return entries;
}

function toggleProxyPaid(purchId, albKey, entryIdx) {
  const s = dbGet();
  const p = (s.purchases || []).find(x => x.id === purchId);
  if (!p) return;
  const items = JSON.parse(JSON.stringify(p.items || []));
  const item = items.find(it => it.albKey === albKey);
  if (!item?.proxyDetails?.[entryIdx]) return;
  item.proxyDetails[entryIdx].paid = !item.proxyDetails[entryIdx].paid;
  dbUpdateItem('purchases', purchId, { items });
  DB = dbGet();
  render();
}

function toggleProxyDelivered(purchId, albKey, entryIdx) {
  const s = dbGet();
  const p = (s.purchases || []).find(x => x.id === purchId);
  if (!p) return;
  const items = JSON.parse(JSON.stringify(p.items || []));
  const item = items.find(it => it.albKey === albKey);
  if (!item?.proxyDetails?.[entryIdx]) return;
  item.proxyDetails[entryIdx].delivered = !item.proxyDetails[entryIdx].delivered;
  dbUpdateItem('purchases', purchId, { items });
  DB = dbGet();
  render();
}

function updatePurchPrices() {
  const storeId = document.getElementById('mp-store')?.value;
  const store = DB.stores?.find(s => s.id === storeId);
  if (!store) return;
  const albums = getCatAlbums();
  const unpoKeys = getStoreUnpoKeys(store);
  albums.forEach(a => {
    const pr = storePrice(store, a.key);
    const input = document.getElementById('item-price-' + a.key);
    if (input) {
      input.placeholder = pr ? pr.toString() : '가격입력';
      if (!input._userEdited && pr) input.value = pr;
    }
    // unpo highlight
    const row = input?.closest('tr');
    if (row) row.style.background = unpoKeys.includes(a.key) ? 'rgba(168,85,247,.07)' : '';
  });
  // auto-fill est delivery
  const estEl = document.getElementById('mp-estdeliv');
  if (estEl && !estEl.value && store.defDeliveryDate) estEl.value = store.defDeliveryDate;
  updatePurchTotal();
}

function updatePurchItemSub(albKey) {
  const qty = parseFloat(document.getElementById('item-qty-' + albKey)?.value || '0');
  const price = parseFloat(document.getElementById('item-price-' + albKey)?.value || '0');
  const sub = qty * price;
  const el = document.getElementById('item-sub-' + albKey);
  if (!el) return;
  const storeId = document.getElementById('mp-store')?.value;
  const store = DB.stores?.find(s => s.id === storeId);
  const ovs = store ? isOvs(store) : false;
  const cur = store ? getStoreCur(store) : 'KRW';
  el.textContent = sub > 0 ? (ovs ? `${cur} ${Number(sub).toLocaleString()}` : fKRW(sub)) : '';
}

function updatePurchTotal() {
  const el = document.getElementById('mp-total-num');
  if (!el) return;
  const storeId = document.getElementById('mp-store')?.value;
  const store = DB.stores?.find(s => s.id === storeId);
  if (!store) { el.textContent = '—'; return; }
  const ovs = isOvs(store);
  const cur = getStoreCur(store);
  const albums = getCatAlbums();

  let itemsTotal = 0;
  albums.forEach(a => {
    const qty = parseFloat(document.getElementById('item-qty-' + a.key)?.value || '0');
    const price = parseFloat(document.getElementById('item-price-' + a.key)?.value || '0');
    itemsTotal += qty * price;
  });

  let total = 0;
  if (ovs) {
    const foreign = parseFloat(document.getElementById('mp-foreign')?.value || '0') || itemsTotal;
    const intlShipCur = parseFloat(document.getElementById('mp-intlship-cur')?.value || '0');
    const discountCur = parseFloat(document.getElementById('mp-discount-cur')?.value || '0');
    const directKrw = parseFloat(document.getElementById('mp-directkrw')?.value || '0');
    const fwdFee = parseFloat(document.getElementById('mp-fwdfee')?.value || '0');
    const customs = parseFloat(document.getElementById('mp-customs')?.value || '0');
    const domShip = parseFloat(document.getElementById('mp-domship')?.value || '0');
    const base = directKrw > 0 ? directKrw : toKRW(foreign + intlShipCur - discountCur, cur);
    total = base + fwdFee + customs + domShip;
  } else {
    const domShip = parseFloat(document.getElementById('mp-domship')?.value || '0');
    const discount = parseFloat(document.getElementById('mp-discount')?.value || '0');
    total = itemsTotal + domShip - discount;
  }
  // Calculate proxy subtotal from proxy entries
  let proxySubtotal = 0;
  const pCounter = window._proxyNewCounter || 0;
  for (let i = 0; i < pCounter; i++) {
    const qtyEl = document.getElementById('pn-qty-' + i);
    const albEl = document.getElementById('pn-alb-' + i);
    if (!qtyEl || !albEl || !document.getElementById('proxy-new-' + i)) continue;
    const qty = parseInt(qtyEl.value) || 0;
    const albKey = albEl.value;
    const priceEl = document.getElementById('item-price-' + albKey);
    const unitPrice = parseFloat(priceEl?.value) || 0;
    proxySubtotal += qty * unitPrice;
  }

  if (el) {
    el.innerHTML = fKRW(Math.max(0, total)) +
      (proxySubtotal > 0 ? `<span style="display:block;font-size:11px;color:var(--warn);margin-top:2px">대리구매 ${fKRW(proxySubtotal)}</span>` : '');
  }
}

function savePurch() {
  const storeId = document.getElementById('mp-store')?.value;
  if (!storeId) { toast('판매처를 선택하세요.', 'warn'); return; }

  const store = DB.stores?.find(s => s.id === storeId);
  const albums = getCatAlbums();

  // Collect all proxy entries from new proxy box
  const allProxyEntries = [];
  const pCounter = window._proxyNewCounter || 0;
  for (let i = 0; i < pCounter; i++) {
    const qtyEl = document.getElementById('pn-qty-' + i);
    const albEl = document.getElementById('pn-alb-' + i);
    if (!qtyEl || !albEl || !document.getElementById('proxy-new-' + i)) continue;
    const qty = parseInt(qtyEl.value) || 0;
    const nameVal = document.getElementById('pn-name-' + i)?.value || '';
    if (!qty && !nameVal) continue;
    allProxyEntries.push({
      albKey: albEl.value,
      name: nameVal,
      qty,
      paid: document.getElementById('pn-paid-' + i)?.checked || false,
      delivered: document.getElementById('pn-deliv-' + i)?.checked || false,
      type: document.getElementById('pn-type-' + i)?.value || 'receive',
    });
  }

  const items = albums.map(a => {
    const itemProxies = allProxyEntries.filter(e => e.albKey === a.key);
    const proxyQty = itemProxies.reduce((s, e) => s + (e.qty||0), 0);
    return {
      albKey: a.key,
      qty: parseInt(document.getElementById('item-qty-' + a.key)?.value || '0'),
      unitPrice: parseFloat(document.getElementById('item-price-' + a.key)?.value || '0'),
      proxyQty,
      proxyDetails: itemProxies,
    };
  }).filter(it => it.qty > 0 || it.proxyQty > 0 || it.proxyDetails.length > 0);

  const purch = {
    storeId,
    items,
    orderDate: document.getElementById('mp-date')?.value || '',
    orderNumber: document.getElementById('mp-ordno')?.value || '',
    status: document.getElementById('mp-status')?.value || 'waiting',
    domShip: parseFloat(document.getElementById('mp-domship')?.value || '0'),
    intlShip: parseFloat(document.getElementById('mp-intlship-cur')?.value || '0'),
    fwdFee: parseFloat(document.getElementById('mp-fwdfee')?.value || '0'),
    customs: parseFloat(document.getElementById('mp-customs')?.value || '0'),
    discount: parseFloat(document.getElementById('mp-discount')?.value || document.getElementById('mp-discount-cur')?.value || '0'),
    directKrw: parseFloat(document.getElementById('mp-directkrw')?.value || '0'),
    foreignTotal: parseFloat(document.getElementById('mp-foreign')?.value || '0'),
    proxyKrw: parseFloat(document.getElementById('mp-proxykrw')?.value || '0'),
    carrier: document.getElementById('mp-carrier-sel')?.value || '',
    trackingNumber: document.getElementById('mp-tracking')?.value || '',
    shippedAt: document.getElementById('mp-shipdate')?.value || '',
    deliveredAt: document.getElementById('mp-delivdate')?.value || '',
    estDelivDate: document.getElementById('mp-estdeliv')?.value || '',
    memo: document.getElementById('mp-memo')?.value || '',
    createdAt: new Date().toISOString(),
  };

  if (S.editPurchId) {
    dbUpdateItem('purchases', S.editPurchId, purch);
    toast('구매 기록 수정됨');
  } else {
    dbInsert('purchases', purch);
    toast('구매 기록 추가됨');
  }
  closeModal('modal-purch');
  render();
}

// STORES

function storeMinKrw(store) {
  const albums = getCatAlbums(store.categoryId);
  const cur = getStoreCur(store);
  const prices = albums.map(a => {
    const pr = storePrice(store, a.key);
    if (pr === null || pr === undefined) return Infinity;
    return isOvs(store) ? toKRW(pr, cur) : pr;
  }).filter(v => v < Infinity);
  if (!prices.length) return Infinity;
  return Math.min(...prices);
}

function renderStores() {
  const albums = getCatAlbums();
  const search = document.getElementById('store-search')?.value.toLowerCase() || '';
  const countryF = document.getElementById('store-country-filter')?.value || '';
  const albF = document.getElementById('store-alb-filter')?.value || S.albKey || '';
  const showEnded = S.storeShowEnded || false;
  const musicOnly = S.storeMusicOnly || false;
  const unpoOnly = S.storeUnpoOnly || false;
  const videocallOnly = S.storeVcOnly || false;
  document.getElementById('btn-show-ended')?.classList.toggle('active', showEnded);
  document.getElementById('btn-music-only')?.classList.toggle('active', musicOnly);
  document.getElementById('btn-unpo-only')?.classList.toggle('active', unpoOnly);
  document.getElementById('btn-vc-only')?.classList.toggle('active', videocallOnly);

  // Album tabs
  const tabsEl = document.getElementById('stores-alb-tabs');
  if (tabsEl) {
    tabsEl.innerHTML = `<button class="alb-chip${!albF ? ' active' : ''}" onclick="S.albKey='';render()">전체</button>` +
      albums.map(a => `<button class="alb-chip${albF===a.key ? ' active' : ''}" onclick="S.albKey='${a.key}';render()">${a.name}</button>`).join('');
  }

  let stores = catStores();
  if (search) stores = stores.filter(s => {
    const distN = distName(s.distId).toLowerCase();
    return s.name.toLowerCase().includes(search) || distN.includes(search);
  });
  if (countryF) stores = stores.filter(s => s.country === countryF);
  if (albF) stores = stores.filter(s => getStoreUnpoKeys(s).includes(albF) || (s.priceMode === 'country') || (s.customPrices && albF in s.customPrices && s.customPrices[albF] !== null));
  if (!showEnded) stores = stores.filter(s => !isExpired(s));
  if (musicOnly) stores = stores.filter(s => s.isMusicStreamTeam);
  if (unpoOnly) stores = stores.filter(s => getStoreUnpoKeys(s).length > 0);
  if (videocallOnly) stores = stores.filter(s => s.videocall);

  // Find cheapest store per cat (by first album price in KRW)
  const allCatStores = catStores().filter(s => !isExpired(s));
  const minPrice = Math.min(...allCatStores.map(s => storeMinKrw(s)));

  const grid = document.getElementById('stores-grid');
  grid.innerHTML = stores.length
    ? stores.map(s => renderStoreCard(s, storeMinKrw(s) === minPrice && minPrice < Infinity)).join('')
    : '<div class="empty" style="grid-column:1/-1">조건에 맞는 판매처가 없습니다</div>';
}

function renderStoreCard(s, isCheapest = false) {
  const dist = distName(s.distId);
  const country = COUNTRIES[s.country];
  const expired = isExpired(s);
  const albums = getCatAlbums(s.categoryId);
  const unpoKeys = getStoreUnpoKeys(s);
  const deadline = fDeadline(s);
  const isUrgent = !expired && s.purchaseEnd && Math.ceil((new Date(s.purchaseEnd)-new Date())/86400000) <= 3;

  const priceRows = albums.map(a => {
    const pr = storePrice(s, a.key);
    if (pr === null) return '';
    const cur = getStoreCur(s);
    const prKRW = isOvs(s) ? toKRW(pr, cur) : pr;
    const isUnpo = unpoKeys.includes(a.key);
    return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0${isUnpo?';background:rgba(168,85,247,.07);border-radius:3px;padding-left:4px':''}">
      <span class="text-muted">${a.name}${isUnpo?` <span class="badge badge-pk" style="font-size:9px">미공포</span>`:''}</span>
      <span class="fw-600">${isOvs(s) ? `${cur} ${Number(pr).toLocaleString()} <span style="font-size:10px;color:var(--tx3)">(${fKRW(prKRW)})</span>` : fKRW(pr)}</span>
    </div>`;
  }).filter(Boolean).join('');

  return `<div class="card" style="margin-bottom:0;${expired ? 'opacity:.55;' : ''}cursor:pointer" onclick="openStorePopup('${s.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="fw-600">${s.name}</span>
          ${country ? `<span style="font-size:11px;color:var(--tx3)">${country.flag} ${country.lb}</span>` : ''}
          ${s.round ? `<span class="badge badge-info" style="font-size:10px">${s.round}차</span>` : ''}
          ${isCheapest ? '<span class="badge badge-ok" style="font-size:10px">최저가</span>' : ''}
        </div>
        <div class="text-sm text-muted">${dist || ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        ${s.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : ''}
        ${s.videocall ? '<span class="badge badge-pk" style="font-size:10px">📞 영통</span>' : ''}
        ${s.hanteoChart ? '<span style="font-size:10px;background:rgba(96,165,250,.15);color:var(--info);padding:1px 5px;border-radius:3px">한터</span>' : ''}
        ${s.offlineLuckyDraw ? '<span style="font-size:11px;background:rgba(192,132,252,.15);color:var(--pk);padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0">럭드</span>' : ''}
      </div>
    </div>

    <div style="margin-bottom:8px">${priceRows || '<div class="text-muted text-sm">가격 정보 없음</div>'}</div>

    <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px">
      <span style="color:var(--tx3)">${s.purchaseStart ? fDate(s.purchaseStart, true) + ' ~ ' + (s.purchaseEnd ? fDate(s.purchaseEnd, true) : (s.purchaseEndTxt || '미정')) : ''}</span>
      <div style="text-align:right">
        ${isUrgent
          ? `<div style="font-weight:700;background:var(--err);color:#fff;padding:1px 6px;border-radius:4px">${deadline}</div>`
          : deadline
            ? `<div style="font-weight:600;color:${expired?'var(--tx3)':'var(--ok)'};font-size:11px">${deadline}</div>`

    ${(s.offlineEvents?.length ? s.offlineEvents : s.offlineStart ? [{ start: s.offlineStart, end: s.offlineEnd }] : []).map(ev =>
      `<div style="font-size:11px;color:var(--warn);margin-top:3px">🏪 ${ev.start ? fDate(ev.start) : ''}${ev.end && ev.end !== ev.start ? ' ~ ' + fDate(ev.end) : ''}</div>`
    ).join('')}
  </div>`;
}

    <div class="section-divider">오프라인 행사</div>
    ${offlineEvents.map(ev => `
      <div style="background:var(--sur2);border-radius:var(--r-sm);padding:10px;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600">${ev.start ? fDate(ev.start) : ''}${ev.end && ev.end !== ev.start ? ' ~ ' + fDate(ev.end) : ''}
          ${ev.luckyDraw ? ' <span style="font-size:10px;background:rgba(192,132,252,.15);color:var(--pk);padding:1px 4px;border-radius:3px;font-weight:600">럭드</span>' : ''}
        </div>
        ${(() => {
          const addrMapUrl = ev.mapUrl || (ev.addressDetail ? `https://map.naver.com/v5/search/${encodeURIComponent(ev.addressDetail)}` : null);
          const addrText = ev.addressName ? `${ev.addressName}${ev.addressDetail ? ' · ' + ev.addressDetail : ''}` : ev.addressDetail || '';
          return addrText ? `<div style="font-size:12px;color:var(--tx2);margin-top:3px">📍 ${addrText}${addrMapUrl ? ` <a href="${addrMapUrl}" target="_blank" class="btn btn-ghost btn-xs" style="padding:1px 5px;font-size:10px">지도</a>` : ''}</div>` : '';
        })()}
        ${(() => {
          const DAYS = ['월','화','수','목','금','토','일'];
          const hrs = Object.entries(ev.hoursMap||{}).filter(([,v])=>v).map(([di,v])=>`${DAYS[di]} ${v}`).join(' / ');
          return hrs ? `<div style="font-size:11px;color:var(--tx3);margin-top:3px">${hrs}</div>` : '';
        })()}
        ${ev.note ? `<div style="font-size:12px;color:var(--tx2);margin-top:4px;white-space:pre-wrap">${ev.note}</div>` : ''}
        ${ev.url ? `<a href="${ev.url}" target="_blank" class="btn btn-ghost btn-xs" style="margin-top:6px;display:inline-flex">🔗 이벤트 공지</a>` : ''}
      </div>
    `).join('')}` : '';
  document.getElementById('modal-store-body').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      ${s.isMusicStreamTeam ? '<span class="badge badge-music">🎵 음원총공팀 연계</span>' : ''}
      ${s.round ? `<span class="badge badge-info">${s.round}차</span>` : ''}
      ${country ? `<span class="badge badge-gray">${country.flag} ${country.lb}</span>` : ''}
      ${dist ? `<span class="badge badge-gray">${dist}</span>` : ''}
      ${s.videocall ? '<span class="badge badge-pk">📞 영통</span>' : ''}
      ${getStoreUnpoKeys(s).map(k=>{const alb=(DB.albumTypes||[]).find(a=>a.key===k);return `<span class="badge badge-pk">미공포: ${alb?.shortName||alb?.name||k}</span>`;}).join('')}
    </div>

    <div class="section-divider">가격표</div>
    ${priceTable}

    <div class="section-divider">구매 정보</div>
    <div class="store-detail-grid">
      <div class="store-detail-row"><div class="store-detail-label">구매 시작</div><div class="store-detail-val">${s.purchaseStart ? fDate(s.purchaseStart, true) : '—'}</div></div>
      <div class="store-detail-row"><div class="store-detail-label">구매 종료</div><div class="store-detail-val">${s.purchaseEnd ? fDate(s.purchaseEnd, true) : (s.purchaseEndTxt || '미정')}</div></div>
      <div class="store-detail-row"><div class="store-detail-label">배송예정일</div><div class="store-detail-val">${s.defDeliveryDate ? fDate(s.defDeliveryDate) : '미정'}</div></div>
    </div>

    ${offlineHtml}

    ${s.memo ? `
      <div class="section-divider">메모</div>
      <div style="font-size:13px;color:var(--tx2);white-space:pre-wrap">${s.memo}</div>
    ` : ''}

    ${s.url ? `
      <div style="margin-top:16px">
        <a href="${s.url}" target="_blank" class="btn btn-ghost btn-sm">🔗 구매 링크 열기</a>
      </div>
    ` : ''}
  `;

  openModal('modal-store');
}

// UNPO
// ═══════════════════════════════════════════
function renderUnpo() {
  const albums = getCatAlbums();
  const albKey = S.unpoAlbKey || (albums[0]?.key || '');
  const search = document.getElementById('unpo-search')?.value.toLowerCase() || '';
  const ownedOnly = S.unpoOwnedOnly || false;
  document.getElementById('btn-unpo-owned-only')?.classList.toggle('active', ownedOnly);

  // Album tabs
  const tabsEl = document.getElementById('unpo-alb-tabs');
  if (tabsEl) {
    tabsEl.innerHTML = albums.map(a =>
      `<button class="alb-chip${albKey===a.key ? ' active' : ''}" onclick="S.unpoAlbKey='${a.key}';render()">${a.name}</button>`
    ).join('');
    if (!S.unpoAlbKey && albums.length) S.unpoAlbKey = albums[0].key;
  }

  // Get stores with unpo for this album key
  const allUnpoStores = catStores().filter(s => getStoreUnpoKeys(s).includes(albKey));
  const filteredStores = allUnpoStores.filter(s => !search || s.name.toLowerCase().includes(search));

  // Group stores sharing the same unpo sets (via sharedWithStoreIds)
  const shownIds = new Set();
  const storeGroups = [];
  filteredStores.forEach(s => {
    if (shownIds.has(s.id)) return;
    const linkedIds = s.sharedWithStoreIds || [];
    const linked = filteredStores.filter(x => linkedIds.includes(x.id) && !shownIds.has(x.id) && x.id !== s.id);
    shownIds.add(s.id);
    linked.forEach(x => shownIds.add(x.id));
    storeGroups.push({ primary: s, linked });
  });

  function renderStoreUnpoCard(s, linked) {
    const unpo = dbGetUnpoCards(s.id, albKey);

    // Purchase linkage badge
    const storePurch = (DB.purchases || []).find(p => p.storeId === s.id);
    const purchBadge = storePurch
      ? stBadge(storePurch.status || 'waiting') +
        (() => {
          const qty = (storePurch.items || []).filter(i => i.albKey === albKey && i.qty > 0).reduce((acc, i) => acc + i.qty, 0);
          return (qty ? `<span class="text-sm text-muted" style="margin-left:4px">${qty}장</span>` : '') +
            `<button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="viewPurchDetail('${storePurch.id}')">구매상세</button>`;
        })()
      : '<span class="badge badge-gray">미구매</span>';

    // Build store name header (single or grouped)
    const stDist = distName(s.distId);
    const nameHtml = linked && linked.length
      ? `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span class="fw-600">${s.name}${stDist ? ` <span style="color:var(--tx3);font-size:11px;font-weight:400">(${stDist})</span>` : ''}</span>
          ${linked.map(x => {const xDist=distName(x.distId);return `<span style="color:var(--tx2);font-size:12px">= ${x.name}${xDist?` <span style="color:var(--tx3);font-size:11px">(${xDist})</span>`:''}</span>`;}).join('')}
        </div>`
      : `<span class="fw-600">${s.name}</span>`;

    if (!unpo || !unpo.sets?.length) {
      return `<div class="card" style="margin-bottom:12px">
        <div class="card-header">
          <div>${nameHtml} <span class="text-muted text-sm">미공포 없음</span></div>
          <div style="display:flex;gap:6px;align-items:center">${purchBadge}</div>
        </div>
      </div>`;
    }

    // Separate front and back cards; back cards shown once (shared)
    let backCardsSrc = null; // { cards, si } from first set with back cards
    const setsHtml = unpo.sets.map((set, si) => {
      const allCards = set.cards || [];
      const frontCards = allCards.filter(c => !c.note?.endsWith('(뒷)'));
      const backCards = allCards.filter(c => c.note?.endsWith('(뒷)'));
      if (backCards.length && !backCardsSrc) backCardsSrc = { cards: backCards, si };
      const cards = frontCards;
      const cardsHtml = cards.map((c, ci) => {
        if (ownedOnly && !c.owned) return '';
        // ci is the index within frontCards; find actual index in allCards
        const actualCi = allCards.indexOf(c);
        return `<div class="unpo-card-wrap">
          <div class="unpo-card${c.owned ? ' owned' : ''}" onclick="toggleUnpoOwned('${s.id}','${albKey}',${si},${actualCi})">
            ${c.img ? `<img src="${c.img}" loading="lazy">` : '<div class="no-img">📷<br>미등록</div>'}
          </div>
          ${c.note ? `<div style="font-size:10px;color:var(--tx3);text-align:center">${c.note}</div>` : ''}
          ${c.owned ? '<div class="unpo-owned-badge">WANT</div>' : ''}
        </div>`;
      }).filter(Boolean).join('');

      if (!cardsHtml) return '';
      return `<div style="margin-bottom:12px">
        ${set.memo ? `<div style="font-size:12px;color:var(--tx2);margin-bottom:6px">${set.memo}</div>` : ''}
        <div style="display:grid;grid-template-columns:repeat(${Math.max(cards.length,1)},1fr);gap:5px">${cardsHtml}</div>
      </div>`;
    }).filter(Boolean).join('');

    // Shared back cards section (shown once)
    let backSectionHtml = '';
    if (backCardsSrc) {
      const { cards: bCards, si: bSi } = backCardsSrc;
      const bOwnedCount = bCards.filter(c => c.owned).length;
      const bAllCards = unpo.sets[bSi]?.cards || [];
      const bCardsHtml = bCards.map(c => {
        if (ownedOnly && !c.owned) return '';
        const actualCi = bAllCards.indexOf(c);
        return `<div class="unpo-card-wrap">
          <div class="unpo-card${c.owned ? ' owned' : ''}" onclick="toggleUnpoOwned('${s.id}','${albKey}',${bSi},${actualCi})">
            ${c.img ? `<img src="${c.img}" loading="lazy">` : '<div class="no-img">📷<br>미등록</div>'}
          </div>
          ${c.note ? `<div style="font-size:10px;color:var(--tx3);text-align:center">${c.note.replace(' (뒷)', '')}</div>` : ''}
          ${c.owned ? '<div class="unpo-owned-badge">WANT</div>' : ''}
        </div>`;
      }).filter(Boolean).join('');
      if (bCardsHtml) {
        backSectionHtml = `<div style="margin-top:4px;padding-top:10px;border-top:1px dashed var(--bd)">
          <div style="font-size:11px;color:var(--tx2);font-weight:600;margin-bottom:6px">뒷면 공통 (${bOwnedCount}/${bCards.length})</div>
          <div style="display:grid;grid-template-columns:repeat(${Math.max(bCards.length,1)},1fr);gap:5px">${bCardsHtml}</div>
        </div>`;
      }
    }

    const totalCards = unpo.sets.reduce((acc, set) => acc + (set.cards?.length || 0), 0);
    const ownedCards = unpo.sets.reduce((acc, set) => acc + (set.cards?.filter(c => c.owned).length || 0), 0);

    return `<div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <div>${nameHtml}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${purchBadge}
          <span class="badge ${ownedCards === totalCards && totalCards > 0 ? 'badge-ok' : 'badge-gray'}">${ownedCards}/${totalCards}</span>
        </div>
      </div>
      ${setsHtml || '<div class="empty">카드 정보 없음</div>'}
      ${backSectionHtml}
    </div>`;
  }

  const html = storeGroups.map(g => renderStoreUnpoCard(g.primary, g.linked)).join('');

  document.getElementById('unpo-content').innerHTML = html || '<div class="empty">미공포 정보가 없습니다.<br>관리자에서 등록하세요.</div>';
}

function toggleUnpoOwned(storeId, albKey, si, ci) {
  const s = dbGet();
  const ucIdx = (s.unpoCards || []).findIndex(uc => uc.storeId === storeId && uc.albumTypeId === albKey);
  if (ucIdx < 0) return;
  const newUnpo = JSON.parse(JSON.stringify(s.unpoCards));
  const card = newUnpo[ucIdx]?.sets?.[si]?.cards?.[ci];
  if (card) {
    card.owned = !card.owned;
    dbUpdate(st => ({ ...st, unpoCards: newUnpo }));
    DB = dbGet();
    render();
  }
}

// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
function renderCal() {
  // Sub-tab management
  const calTab = S.calTab || 'calendar';
  document.querySelectorAll('[data-caltab]').forEach(el =>
    el.classList.toggle('active', el.dataset.caltab === calTab));
  document.getElementById('cal-calendar-view').style.display = calTab === 'calendar' ? '' : 'none';
  document.getElementById('cal-events-view').style.display = calTab === 'events' ? '' : 'none';
  document.getElementById('cal-header-checks').style.display = calTab === 'calendar' ? '' : 'none';

  if (calTab === 'events') { renderCalEvents(); return; }

  const y = S.calYear, m = S.calMonth;
  const today = new Date();
  const localDateStr = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-title').textContent = y + '년 ' + monthNames[m];

  const showPur = document.getElementById('cal-show-pur')?.checked !== false;
  const showOff = document.getElementById('cal-show-off')?.checked !== false;
  const showDel = document.getElementById('cal-show-del')?.checked !== false;
  const showVc = document.getElementById('cal-show-vc')?.checked !== false;

  // Days header
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('cal-header-row').innerHTML = days.map(d =>
    `<div class="cal-header-cell">${d}</div>`
  ).join('');

  // Build events map
  const events = {}; // date string -> [{type, label, color}]
  const addEvent = (dateStr, ev) => {
    if (!events[dateStr]) events[dateStr] = [];
    events[dateStr].push(ev);
  };

  const cat = getCat();

  // Release date
  if (cat?.releaseDate) {
    addEvent(cat.releaseDate, { type: 'release', label: '🎵 발매일: ' + cat.name });
  }

  const stores = catStores();
  stores.forEach(s => {
    if (showPur) {
      if (s.purchaseStart) addEvent(s.purchaseStart.slice(0,10), { type: 'purchase-start', label: '🛒 시작: ' + s.name, storeId: s.id });
      if (s.purchaseEnd) addEvent(s.purchaseEnd.slice(0,10), { type: 'purchase-end', label: '🛒 마감: ' + s.name, storeId: s.id });
    }
    if (showOff) {
      // Highlight entire offline period (every day in range)
      const offEvents = s.offlineEvents?.length ? s.offlineEvents : (s.offlineStart ? [{ start: s.offlineStart, end: s.offlineEnd || s.offlineStart, addressName: s.offlineAddress || '' }] : []);
      offEvents.forEach(oe => {
        const startStr = (oe.start || '').slice(0, 10);
        const endStr = (oe.end || startStr).slice(0, 10);
        if (!startStr) return;
        const start = new Date(startStr + 'T00:00:00');
        const end = new Date(endStr + 'T00:00:00');
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const ds = localDateStr(d);
          const isStart = ds === startStr;
          const isEnd = ds === endStr && endStr !== startStr;
          addEvent(ds, { type: 'offline', label: '🏪 ' + s.name + (isStart ? ' 시작' : isEnd ? ' 종료' : ''), storeId: s.id });
        }
      });
    }
  });

  if (showVc) {
    stores.forEach(s => {
      if (s.vcAnnounceDate) addEvent(s.vcAnnounceDate.slice(0,10), { type: 'vc', label: '📞 영통 발표: ' + s.name, storeId: s.id });
      if (s.vcStart) addEvent(s.vcStart.slice(0,10), { type: 'vc', label: '📞 영통: ' + s.name, storeId: s.id });
      if (s.vcEnd && s.vcEnd !== s.vcStart) addEvent(s.vcEnd.slice(0,10), { type: 'vc', label: '📞 영통 마감: ' + s.name, storeId: s.id });
    });
  }

  if (showDel) {
    const purches = (DB.purchases || []).filter(p => {
      const st = DB.stores?.find(s => s.id === p.storeId);
      return st?.categoryId === S.catId;
    });
    purches.forEach(p => {
      const store = DB.stores?.find(s => s.id === p.storeId);
      const delivDate = p.deliveredAt || store?.defDeliveryDate;
      if (delivDate) addEvent(delivDate.slice(0,10), { type: 'delivery', label: '📦 ' + storeName(p.storeId) });
    });
  }

  // 초동기간 helper
  // chodongBaseDate = when chodong counting begins (release day)
  const chodongBaseDateStr = cat?.chodongBaseDate || cat?.digitalReleaseDate || cat?.releaseDate;
  const releaseDate = chodongBaseDateStr ? new Date(chodongBaseDateStr + 'T00:00:00') : null;
  // 초동 마감일 = D-day; if not set, defaults to chodongBase + 7
  const chodongEndDateStr = cat?.chodongEndDate || (releaseDate ? new Date(releaseDate.getTime() + 7*86400000).toISOString().slice(0,10) : null);
  const chodongEndDate = chodongEndDateStr ? new Date(chodongEndDateStr + 'T00:00:00') : null;
  const preRelDate = cat?.preReleaseDate;
  const physRelDate = cat?.physicalReleaseDate;

  function chodongCls(dateStr) {
    if (preRelDate && dateStr === preRelDate) return 'pre-release';
    if (physRelDate && dateStr === physRelDate) return 'physical-release';
    if (chodongEndDateStr && dateStr === chodongEndDateStr) return 'chodong-end';
    if (!releaseDate || !chodongEndDate) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((d - releaseDate) / 86400000);
    if (diff === 0) return 'chodong-release';
    if (diff > 0 && d < chodongEndDate) return 'chodong';
    return '';
  }

  function ddayLabel(dateStr) {
    if (preRelDate && dateStr === preRelDate) return '<span style="font-size:9px;color:#a855f7;font-weight:700">선공개</span>';
    if (physRelDate && dateStr === physRelDate) return '<span style="font-size:9px;color:var(--ok);font-weight:700">실물</span>';
    // D-day labels: count DOWN from 초동 마감일
    if (!chodongEndDate) {
      if (releaseDate) {
        const d = new Date(dateStr + 'T00:00:00');
        if (Math.round((d - releaseDate) / 86400000) === 0) return '<span style="font-size:9px;color:var(--pk);font-weight:700">발매</span>';
      }
      return '';
    }
    const d = new Date(dateStr + 'T00:00:00');
    const diffFromEnd = Math.round((chodongEndDate - d) / 86400000);
    if (diffFromEnd === 0) return '<span style="font-size:9px;color:var(--err);font-weight:700">D-day</span>';
    if (diffFromEnd > 0 && diffFromEnd <= 7) return `<span style="font-size:9px;color:var(--warn)">D-${diffFromEnd}</span>`;
    if (releaseDate && Math.round((d - releaseDate) / 86400000) === 0) return '<span style="font-size:9px;color:var(--pk);font-weight:700">발매</span>';
    return '';
  }

  // Build calendar grid
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();

  let cells = '';
  let totalCells = 42;
  for (let i = 0; i < totalCells; i++) {
    let day, isOther = false, dateStr;
    if (i < firstDay) {
      day = daysInPrev - firstDay + i + 1;
      isOther = true;
      dateStr = localDateStr(new Date(y, m-1, day));
    } else if (i - firstDay >= daysInMonth) {
      day = i - firstDay - daysInMonth + 1;
      isOther = true;
      dateStr = localDateStr(new Date(y, m+1, day));
    } else {
      day = i - firstDay + 1;
      dateStr = localDateStr(new Date(y, m, day));
    }

    const isToday = dateStr === localDateStr(today);
    const isSelected = dateStr === S.calDay;
    const dayEvs = events[dateStr] || [];
    const isHighlighted = S.calHighlightStore && dayEvs.some(ev => ev.storeId === S.calHighlightStore);
    // Deduplicate offline events for same store on same day (show once per store)
    const seenStores = new Set();
    const displayEvs = dayEvs.filter(ev => {
      if (ev.storeId && (ev.type === 'offline')) {
        if (seenStores.has(ev.storeId + ev.type)) return false;
        seenStores.add(ev.storeId + ev.type);
      }
      return true;
    }).slice(0, 3);
    const chodong = chodongCls(dateStr);

    cells += `<div class="cal-cell${isOther ? ' other-month' : ''}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}${chodong ? ' ' + chodong : ''}${isHighlighted ? ' store-highlight' : ''}"
      onclick="calSelectDay('${dateStr}')">
      <div class="cal-day-num" style="display:flex;justify-content:space-between;align-items:center">
        <span>${day}</span>${ddayLabel(dateStr)}
      </div>
      ${displayEvs.map(ev => {
        const clickHandler = `onclick="event.stopPropagation();calSelectDay('${dateStr}')"`;
        return `<div class="cal-event ${ev.type}" ${clickHandler} style="cursor:pointer">${ev.label.replace(/^[🛒🏪📦🎵]\s*/,'')}</div>`;
      }).join('')}
      ${dayEvs.length > 3 ? `<div style="font-size:9px;color:var(--tx3)">+${dayEvs.length-3}</div>` : ''}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML = cells;

  // Day event detail list
  let detailHtml = buildCalLegend(cat);
  if (S.calDay) {
    const dayEvs = (events[S.calDay] || []);
    if (dayEvs.length) {
      const CAL_GROUPS = [
        { label: '🎵 앨범/발매', types: ['release','chodong-release','pre-release','physical-release'] },
        { label: '🛒 구매', types: ['purchase-start','purchase','purchase-end'] },
        { label: '🏪 오프라인', types: ['offline'] },
        { label: '📦 배송', types: ['delivery'] },
        { label: '📞 영통', types: ['vc'] },
      ];
      const grouped = CAL_GROUPS.map(g => ({ ...g, evs: dayEvs.filter(ev => g.types.includes(ev.type)) })).filter(g => g.evs.length);
      const groupedHtml = grouped.map(g => `
        <div style="font-size:11px;font-weight:600;color:var(--tx3);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px">${g.label}</div>
        ${g.evs.map(ev => buildCalDayItem(ev)).join('')}
      `).join('');
      detailHtml += `<div style="margin-top:14px">
        <div class="section-divider" style="margin-bottom:8px">${formatDateKo(S.calDay)} 일정 (${dayEvs.length}건)</div>
        ${groupedHtml}
      </div>`;
    } else {
      detailHtml += `<div style="margin-top:10px;font-size:12px;color:var(--tx3);text-align:center">${formatDateKo(S.calDay)} — 일정 없음</div>`;
    }
  }
  document.getElementById('cal-day-detail').innerHTML = detailHtml;
}

function buildCalLegend(cat) {
  if (!cat) return '';
  const hasRelease = cat.chodongBaseDate || cat.digitalReleaseDate || cat.releaseDate;
  const chodongEndStr = cat.chodongEndDate || (hasRelease ? new Date(new Date(hasRelease + 'T00:00:00').getTime() + 7*86400000).toISOString().slice(0,10) : null);
  return `<div class="cal-legend">
    ${cat.preReleaseDate ? '<span class="cal-legend-item pre-release">선공개</span>' : ''}
    ${hasRelease ? '<span class="cal-legend-item chodong-release">발매일</span>' : ''}
    ${cat.physicalReleaseDate ? '<span class="cal-legend-item physical-release">실물발매</span>' : ''}
    ${hasRelease ? '<span class="cal-legend-item chodong">초동기간 (D-7~D-1)</span>' : ''}
    ${chodongEndStr ? '<span class="cal-legend-item chodong-end">초동마감 (D-day)</span>' : ''}
    <span class="cal-legend-item purchase-start">구매 시작</span>
    <span class="cal-legend-item purchase-end">구매 마감</span>
    <span class="cal-legend-item offline">오프라인</span>
    <span class="cal-legend-item delivery">배송예정</span>
    <span class="cal-legend-item vc">영통</span>
  </div>`;
}

function renderCalEvents() {
  const allStores = catStores();
  const today = new Date().toISOString().slice(0,10);
  // Include stores with either new offlineEvents or legacy offlineStart
  const stores = allStores.filter(s => s.offlineEvents?.length || s.offlineStart);
  const sorted = [...stores].sort((a, b) => {
    const aStart = a.offlineEvents?.[0]?.start || a.offlineStart || '';
    const bStart = b.offlineEvents?.[0]?.start || b.offlineStart || '';
    return aStart.localeCompare(bStart);
  });
  const future = sorted.filter(s => {
    const end = s.offlineEvents?.length ? s.offlineEvents[s.offlineEvents.length-1]?.end : s.offlineEnd;
    return !end || end >= today;
  });
  const past = sorted.filter(s => {
    const end = s.offlineEvents?.length ? s.offlineEvents[s.offlineEvents.length-1]?.end : s.offlineEnd;
    return end && end < today;
  });

  function eventCard(s) {
    const evts = s.offlineEvents?.length ? s.offlineEvents
      : s.offlineStart ? [{ start: s.offlineStart, end: s.offlineEnd, addressName: s.offlineAddressName||'', addressDetail: s.offlineAddressDetail||s.offlineAddress||'', note: s.offlineNote||'', luckyDraw: s.offlineLuckyDraw||false }]
      : [];
    return `<div class="card" style="margin-bottom:10px">
      <div class="card-header" style="cursor:pointer" onclick="openStorePopup('${s.id}')">
        <div class="fw-600">${s.name}</div>
        <div style="display:flex;gap:4px;align-items:center">
          ${s.offlineLuckyDraw ? '<span style="font-size:11px;background:rgba(192,132,252,.15);color:var(--pk);padding:2px 6px;border-radius:3px;font-weight:600">럭드</span>' : ''}
          ${s.videocall ? '<span class="badge badge-info" style="font-size:10px">📞 영통</span>' : ''}
        </div>
      </div>
      ${evts.map(ev => {
        const loc = ev.addressName || ev.addressDetail || '';
        const mapUrl = ev.mapUrl || (ev.addressDetail ? `https://map.naver.com/v5/search/${encodeURIComponent(ev.addressDetail)}` : null);
        const luckyTag = ev.luckyDraw ? ' <span style="font-size:10px;background:rgba(192,132,252,.15);color:var(--pk);padding:1px 4px;border-radius:3px;font-weight:600">럭드</span>' : '';
        return `<div style="padding:8px 0;border-top:1px solid var(--bd)">
          <div style="font-size:13px;color:var(--tx2);margin-bottom:4px">📅 ${fDate(ev.start)}${ev.end&&ev.end!==ev.start?' ~ '+fDate(ev.end):''}${luckyTag}</div>
          ${loc ? `<div style="font-size:12px;color:var(--tx2);margin-bottom:3px">📍 ${mapUrl ? `<a href="${mapUrl}" target="_blank" style="color:var(--pk)">${loc} 🗺</a>` : loc}</div>` : ''}
          ${ev.note ? `<div style="font-size:12px;color:var(--tx2);white-space:pre-wrap">${ev.note}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('cal-events-list').innerHTML = `
    ${future.length ? `<div class="section-divider">예정 / 진행중 (${future.length}건)</div>${future.map(eventCard).join('')}` : '<div class="empty">예정된 오프라인 이벤트 없음</div>'}
    ${past.length ? `<div class="section-divider">지난 이벤트 (${past.length}건)</div><div style="opacity:.6">${past.map(eventCard).join('')}</div>` : ''}
  `;
}

function calSelectDay(dateStr) { S.calDay = S.calDay === dateStr ? null : dateStr; S.calHighlightStore = null; render(); }
function calPrev() { if (S.calMonth === 0) { S.calMonth = 11; S.calYear--; } else S.calMonth--; render(); }
function calNext() { if (S.calMonth === 11) { S.calMonth = 0; S.calYear++; } else S.calMonth++; render(); }
function calToday() { S.calYear = new Date().getFullYear(); S.calMonth = new Date().getMonth(); S.calDay = new Date().toISOString().slice(0,10); render(); }

function calHighlightStore(storeId) {
  S.calHighlightStore = S.calHighlightStore === storeId ? null : storeId;
  render();
}

const CAL_TYPE_LABELS = {
  release: { icon: '🎵', label: '발매일', cls: 'release' },
  'chodong-release': { icon: '🎵', label: '발매일', cls: 'chodong-release' },
  'physical-release': { icon: '💿', label: '실물발매', cls: 'physical-release' },
  'pre-release': { icon: '🎵', label: '선공개', cls: 'pre-release' },
  'purchase-start': { icon: '🛒', label: '구매시작', cls: 'purchase-start' },
  'purchase-end': { icon: '⏰', label: '구매마감', cls: 'purchase-end' },
  purchase: { icon: '🛒', label: '구매', cls: 'purchase' },
  offline: { icon: '🏪', label: '오프라인', cls: 'offline' },
  delivery: { icon: '📦', label: '배송', cls: 'delivery' },
  vc: { icon: '📞', label: '영통', cls: 'vc' },
};

function buildCalDayItem(ev) {
  const meta = CAL_TYPE_LABELS[ev.type] || { icon: '', label: ev.type, cls: ev.type };
  const isHL = S.calHighlightStore && S.calHighlightStore === ev.storeId;
  // Strip leading emoji+space from label (handles multi-byte emoji safely)
  const cleanLabel = ev.label.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]️?\s*/u, '').replace(/^[^\s:]+:\s*/, match => match.includes(':') ? '' : match);

  // For offline events, show extra info inline
  let extraInfo = '';
  if (ev.type === 'offline' && ev.storeId) {
    const st = DB.stores?.find(s => s.id === ev.storeId);
    const evts = st?.offlineEvents?.length ? st.offlineEvents
      : st?.offlineStart ? [{ start: st.offlineStart, end: st.offlineEnd, addressName: st.offlineAddressName||'', addressDetail: st.offlineAddressDetail||st.offlineAddress||'', note: st.offlineNote||'' }]
      : [];
    const matchEvt = evts.find(e => S.calDay >= (e.start||'') && S.calDay <= (e.end||e.start||''));
    const loc = matchEvt?.addressName || matchEvt?.addressDetail || '';
    if (loc) extraInfo = `<div style="font-size:11px;color:var(--tx3);margin-top:2px;margin-left:4px">📍 ${loc}</div>`;
  }

  return `<div class="cal-day-item${isHL ? ' hl' : ''}" onclick="${ev.storeId ? `calHighlightStore('${ev.storeId}')` : ''}">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="cal-event ${meta.cls}" style="flex-shrink:0;white-space:nowrap">${meta.icon} ${meta.label}</span>
        <span style="font-size:12px;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cleanLabel}</span>
      </div>
      ${extraInfo}
    </div>
    ${ev.storeId ? `<button class="btn btn-ghost btn-xs" style="flex-shrink:0" onclick="event.stopPropagation();openStorePopup('${ev.storeId}')">상세</button>` : ''}
  </div>`;
}

function formatDateKo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function openModal(id) { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.modal-bg').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.open').forEach(el => closeModal(el.id));
});

// ═══════════════════════════════════════════
// NOTICES PAGE
// ═══════════════════════════════════════════
function renderNotices() {
  const NOTICE_STYLE = {
    info: 'border-left:3px solid var(--info)',
    warn: 'border-left:3px solid var(--warn)',
    ok: 'border-left:3px solid var(--ok)',
  };
  const notices = (DB.notices || [])
    .filter(n => n.visible)
    .sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.createdAt) - new Date(a.createdAt));

  const el = document.getElementById('notices-list');
  if (!el) return;
  el.innerHTML = notices.length
    ? notices.map(n => `
        <div style="background:var(--sur2);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;${NOTICE_STYLE[n.type]||'border-left:3px solid var(--bd2)'}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:${n.body?'8':'0'}px">
            ${n.pinned ? '<span>📌</span>' : ''}
            <span class="fw-600" style="font-size:15px">${n.title}</span>
            <span style="margin-left:auto;font-size:11px;color:var(--tx3)">${n.createdAt ? fDate(n.createdAt) : ''}</span>
          </div>
          ${n.body ? `<div style="font-size:13px;color:var(--tx2);white-space:pre-wrap;line-height:1.7">${n.body}</div>` : ''}
        </div>`).join('')
    : '<div class="empty">공지사항이 없습니다.</div>';
}

// ═══════════════════════════════════════════
// NOTICE POPUP
// ═══════════════════════════════════════════
function checkNoticePopup() {
  const notices = (DB.notices || []).filter(n => n.visible);
  if (!notices.length) return;
  const latest = notices.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.createdAt) - new Date(a.createdAt))[0];
  const dismissed = JSON.parse(localStorage.getItem('albumapp_noticed') || '{}');
  const ts = dismissed[latest.id];
  if (ts && Date.now() - ts < 72 * 3600 * 1000) return;
  document.getElementById('np-title').textContent = latest.title;
  document.getElementById('np-body').textContent = latest.body || '';
  document.getElementById('notice-popup').style.display = 'flex';
  window._currentNoticeId = latest.id;
}

function dismissNotice(permanent) {
  if (permanent && window._currentNoticeId) {
    const dismissed = JSON.parse(localStorage.getItem('albumapp_noticed') || '{}');
    dismissed[window._currentNoticeId] = Date.now();
    localStorage.setItem('albumapp_noticed', JSON.stringify(dismissed));
  }
  document.getElementById('notice-popup').style.display = 'none';
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
init();
</script>
