<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>앨범 구매관리</title>
<link rel="stylesheet" href="css/app.css">
<style>
/* ── inline overrides ── */
.purch-items-table td { padding: 5px 8px; font-size: 12px; }
.purch-items-table th { padding: 5px 8px; font-size: 11px; }
.store-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
.store-detail-row { display: flex; flex-direction: column; gap: 2px; }
.store-detail-label { font-size: 11px; color: var(--tx3); }
.store-detail-val { color: var(--tx); }
.cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.cal-nav-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }
.cal-day-panel { background: var(--sur2); border-radius: var(--r); padding: 14px; margin-top: 12px; }
.price-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--bd); }
.price-row:last-child { border: none; }
.total-price-row { font-weight: 700; font-size: 15px; padding-top: 8px; }
.section-divider { font-size: 11px; color: var(--tx3); letter-spacing: .06em; text-transform: uppercase; padding: 12px 0 6px; font-weight: 600; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Hamburger button (mobile) -->
<button id="menu-btn" class="menu-btn" onclick="toggleSidebar()" aria-label="메뉴">☰</button>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Notice popup -->
<div id="notice-popup" class="notice-popup" style="display:none">

    <div class="notice-popup-title" id="np-title"></div>
    <div class="notice-popup-body" id="np-body"></div>

      <button class="btn btn-ghost btn-sm" onclick="dismissNotice(true)">3일간 안보기</button>
      <button class="btn btn-p btn-sm" onclick="dismissNotice(false)">닫기</button>

<div class="app-layout">
<!-- ── Sidebar ── -->

  <div class="nav-section">메뉴</div>
  <button class="nav-item active" onclick="nav('dash')" data-tab="dash">
    <i class="nav-icon">◈</i> 대시보드

  <button class="nav-item" onclick="nav('stores')" data-tab="stores">
    <i class="nav-icon">🏪</i> 판매처 정보

  <button class="nav-item" onclick="nav('unpo')" data-tab="unpo">

<!-- ─ 분류 선택 ─ -->

<!-- ════════════════════════════════════════

<div class="page active" id="page-dash">

<script src="js/db.js"></script>
<script src="js/seed.js"></script>
<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const COUNTRIES = {
  KR: { lb: '한국', cur: 'KRW', ovs: false, flag: '🇰🇷' },
  JP: { lb: '일본', cur: 'JPY', ovs: true,  flag: '🇯🇵' },
  CN: { lb: '중국', cur: 'CNY', ovs: true,  flag: '🇨🇳' },
  US: { lb: '미국', cur: 'USD', ovs: true,  flag: '🇺🇸' },
  TW: { lb: '대만', cur: 'TWD', ovs: true,  flag: '🇹🇼' },
};

const STATUS_MAP = {
  planned:   { lb: '계획',    cls: 'st-planned' },
  waiting:   { lb: '대기중',  cls: 'st-waiting' },
  ordered:   { lb: '주문완료',cls: 'st-ordered' },
  preparing: { lb: '발송준비',cls: 'st-preparing' },
  shipped:   { lb: '배송중',  cls: 'st-shipped' },
  delivered: { lb: '수령완료',cls: 'st-delivered' },
  cancelled: { lb: '취소',    cls: 'st-cancelled' },
};

const DISP_STATUSES = [
  { k: 'none',      lb: '미구매',   cls: 'st-planned',   keys: [] },
  { k: 'waiting',   lb: '구매대기', cls: 'st-waiting',   keys: ['planned', 'waiting'] },
  { k: 'ordered',   lb: '구매완료', cls: 'st-ordered',   keys: ['ordered'] },
  { k: 'shipping',  lb: '배송중',   cls: 'st-shipped',   keys: ['preparing', 'shipped'] },
  { k: 'delivered', lb: '배송완료', cls: 'st-delivered', keys: ['delivered'] },
];

const MEMBERS = ['예준', '노아', '밤비', '은호', '하민'];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let DB = {};
let S = {
  tab: 'dash',
  catId: null,
  albKey: null,
  unpoAlbKey: null,
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  calDay: null,
  showProxy: false,
  hideExpired: true,
  purchSort: 'date',
  storeSort: 'amount',
  dashStatusFilter: null,
  editPurchId: null,
  editStoreId: null,
  storeFromId: null,
};

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  DB = dbInit(seedDatabase);
  // Set default category
  if (DB.categories.length > 0) {
    S.catId = DB.categories[0].id;
  }
  applyTheme();
  buildCatBar();
  buildFilters();
  render();

  // Scroll listener for FAB top
  const main = document.getElementById('main');
  main.addEventListener('scroll', () => {
    const btn = document.getElementById('fab-top');
    if (btn) btn.classList.toggle('show', main.scrollTop > 300);
  }, { passive: true });

  // Auto-sync from admin via BroadcastChannel
  try {
    const bc = new BroadcastChannel('albumapp_sync');
    bc.onmessage = () => { reloadDB(); buildCatBar(); buildFilters(); render(); };
  } catch(e) {}

  checkNoticePopup();
}

// ═══════════════════════════════════════════
// MOBILE SIDEBAR
// ═══════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function reloadDB() {
  DB = dbGet();
}

// ═══════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent = t === 'dark' ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = t === 'dark' ? '다크모드' : '라이트모드';
  dbUpdateSettings({ theme: t });
}

function applyTheme() {
  const t = DB.settings?.theme || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent = t === 'dark' ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = t === 'dark' ? '다크모드' : '라이트모드';
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function nav(tab) {
  S.tab = tab;
  closeSidebar();
  document.querySelectorAll('[data-tab]').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(el =>
    el.classList.toggle('active', el.id === 'page-' + tab));
  document.getElementById('fab').style.display = tab === 'purch' ? 'flex' : 'none';
  render();
}

function render() {
  reloadDB();
  const fns = { dash: renderDash, purch: renderPurch, stores: renderStores, unpo: renderUnpo, cal: renderCal };
  (fns[S.tab] || renderDash)();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function rate(cur) {
  if (cur === 'KRW') return 1;
  return DB.settings?.rates?.[cur]?.rate || 1;
}
function toKRW(amt, cur) { return Math.round(amt * rate(cur)); }
function fKRW(n) {
  if (!n && n !== 0) return '—';
  return Math.round(n).toLocaleString('ko-KR') + '원';
}
function fDate(dt, time = false) {
  if (!dt) return '';
  try {
    const d = new Date(dt);
    const opts = time
      ? { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }
      : { month: '2-digit', day: '2-digit' };
    return d.toLocaleDateString('ko-KR', opts);
  } catch (e) { return dt; }
}
function fDateShort(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return (d.getMonth() + 1) + '/' + d.getDate();
}
function isExpired(store) {
  if (!store.purchaseEnd) return false;
  return new Date(store.purchaseEnd) < new Date();
}
function isOvs(store) { return COUNTRIES[store.country]?.ovs || false; }
function getStoreCur(store) { return COUNTRIES[store.country]?.cur || 'KRW'; }

function storePrice(store, albKey) {
  if (store.priceMode === 'custom') {
    if (store.customPrices && albKey in store.customPrices)
      return store.customPrices[albKey]; // null = 미판매
    return null;
  }
  // country mode: find album type's country price
  const alb = DB.albumTypes?.find(a => a.key === albKey && a.categoryId === store.categoryId);
  if (!alb) return null;
  const cur = getStoreCur(store);
  const country = store.country;
  return alb.countryPrices?.[country] ?? null;
}

function calcPurchTotal(p) {
  const store = DB.stores?.find(s => s.id === p.storeId);
  if (!store) return 0;
  const cur = getStoreCur(store);
  const discount = p.discount || 0;
  if (isOvs(store)) {
    let fAmt = p.foreignTotal || 0;
    if (!fAmt) {
      fAmt = (p.items || []).reduce((sum, it) => {
        const pr = it.unitPrice > 0 ? it.unitPrice : (storePrice(store, it.albKey) || 0);
        return sum + pr * (it.qty || 0);
      }, 0);
    }
    const base = p.directKrw > 0 ? p.directKrw : Math.round(fAmt * rate(cur));
    return Math.max(0, base + (p.intlShip || 0) + (p.fwdFee || 0) + (p.customs || 0) + (p.domShip || 0) - discount);
  } else {
    const items = (p.items || []).reduce((sum, it) => {
      const pr = it.unitPrice > 0 ? it.unitPrice : (storePrice(store, it.albKey) || 0);
      return sum + pr * (it.qty || 0);
    }, 0);
    return Math.max(0, items + (p.domShip || 0) - discount);
  }
}

function calcProxyTotal(p) {
  if (p.proxyKrw > 0) return p.proxyKrw;
  const totalQty = (p.items || []).reduce((s, it) => s + (it.qty || 0), 0);
  if (!totalQty) return 0;
  const proxyQty = (p.items || []).reduce((s, it) => s + (it.proxyQty || 0), 0);
  if (!proxyQty) return 0;
  return Math.round(calcPurchTotal(p) * proxyQty / totalQty);
}

function stBadge(st) {
  const s = STATUS_MAP[st] || STATUS_MAP['waiting'];
  return `<span class="badge ${s.cls}">${s.lb}</span>`;
}

function distName(distId) {
  return DB.distributors?.find(d => d.id === distId)?.name || '';
}

function catStores(catId) {
  return (DB.stores || []).filter(s => s.categoryId === (catId || S.catId));
}

function getCatAlbums(catId) {
  return (DB.albumTypes || []).filter(a => a.categoryId === (catId || S.catId))
    .sort((a, b) => a.sortOrder - b.sortOrder);
}

function getCat(catId) {
  return (DB.categories || []).find(c => c.id === (catId || S.catId));
}

function storeName(storeId) {
  const s = DB.stores?.find(x => x.id === storeId);
  return s ? s.name : '알 수 없는 판매처';
}

function fDeadline(store) {
  if (isExpired(store)) {
    if (!store.purchaseEnd) return '마감';
    const diff = Math.round((new Date() - new Date(store.purchaseEnd)) / 86400000);
    return `마감 (${diff}일 전)`;
  }
  if (!store.purchaseEnd) return store.purchaseEndTxt || '미정';
  const diff = Math.ceil((new Date(store.purchaseEnd) - new Date()) / 86400000);
  if (diff === 0) return '오늘 마감';
  if (diff <= 3) return `D-${diff} ⚠`;
  return `D-${diff}`;
}

function renderDash() {
  const cat = getCat();
  if (!cat) {
    document.getElementById('dash-stats').innerHTML = '<div class="empty">분류가 없습니다. 관리자에서 추가하세요.</div>';

  }

  document.getElementById('dash-sub').textContent = cat.artist + ' · 발매일: ' + (cat.releaseDate ? fDate(cat.releaseDate) : '미정');

  const stores = catStores();
  const albums = getCatAlbums();
  const purches = (DB.purchases || []).filter(p => {
    const st = DB.stores?.find(s => s.id === p.storeId);

  });

  const pendingCount = purches.filter(p => !['delivered','cancelled'].includes(p.status || 'waiting')).length;
  const deliveredCount = purches.filter(p => p.status === 'delivered').length;

  const daysToRelease = cat.releaseDate
    ? Math.ceil((new Date(cat.releaseDate) - new Date()) / 86400000)
    : null;

  // Stat cards: 총지출 / D-day / 총구매장수 / 미배송건수
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${fKRW(totalSpend)}</div>
      <div class="stat-label">총 지출</div>
      <div class="stat-sub" style="line-height:1.6">
        ${waitingSpend > 0 ? `대기 ${fKRW(waitingSpend)}<br>` : ''}${proxySpend > 0 ? `대리 ${fKRW(proxySpend)}` : '내 지출'}
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-num ${daysToRelease === null ? '' : daysToRelease <= 0 ? 'ok' : daysToRelease <= 7 ? 'warn' : ''}">${
        daysToRelease === null ? '?' : daysToRelease <= 0 ? '발매됨' : 'D-' + daysToRelease
      }</div>
      <div class="stat-label">발매까지</div>
      <div class="stat-sub">${cat.releaseDate ? fDate(cat.releaseDate) : '미정'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-num ok">${totalQty}</div>
      <div class="stat-label">총 구매 장수</div>
      <div class="stat-sub">${purches.length}건 구매</div>
    </div>
    <div class="stat-card">
      <div class="stat-num ${pendingCount > 0 ? 'warn' : 'ok'}">${pendingCount}</div>
      <div class="stat-label">미배송 건수</div>
      <div class="stat-sub">수령완료 ${deliveredCount}건</div>
    </div>
  `;

  // Notices

    const NOTICE_STYLE = { info: 'border-left:3px solid var(--info,#4ea8f7)', warn: 'border-left:3px solid var(--warn)', ok: 'border-left:3px solid var(--ok)' };
    const activeNotices = (DB.notices || [])
      .filter(n => n.visible)
      .sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.createdAt) - new Date(a.createdAt));
    noticesEl.innerHTML = activeNotices.map(n => `
      <div style="background:var(--sur2);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;${NOTICE_STYLE[n.type] || ''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:${n.body ? 4 : 0}px">
          ${n.pinned ? '<span>📌</span>' : ''}
          <span class="fw-600" style="font-size:14px">${n.title}</span>
        </div>
        ${n.body ? `<div style="font-size:13px;color:var(--tx2);white-space:pre-wrap">${n.body}</div>` : ''}
      </div>
    `).join('');
  }

  // Status filter strip (구매 현황)
  const purchasedIds = new Set(purches.map(p => p.storeId));
  const bySt = { waiting: 0, ordered: 0, shipping: 0, delivered: 0 };
  purches.forEach(p => {
    const st = p.status || 'waiting';
    if (['planned','waiting'].includes(st)) bySt.waiting++;
    else if (st === 'ordered') bySt.ordered++;
    else if (['preparing','shipped'].includes(st)) bySt.shipping++;
    else if (st === 'delivered') bySt.delivered++;
  });

  const activeFilter = S.dashStatusFilter;
  const filterDefs = [
    { k: null,        lb: '전체',   cls: 'badge-gray',   cnt: purches.length },
    { k: 'waiting',   lb: '구매대기', cls: 'st-waiting',  cnt: bySt.waiting },
    { k: 'ordered',   lb: '구매완료', cls: 'st-ordered',  cnt: bySt.ordered },
    { k: 'shipping',  lb: '배송중',  cls: 'st-shipped',   cnt: bySt.shipping },
    { k: 'delivered', lb: '배송완료', cls: 'st-delivered', cnt: bySt.delivered },
  ];
  const stripEl = document.getElementById('dash-status-strip');
  if (stripEl) {
    stripEl.innerHTML = filterDefs.map(f => {
      const isActive = activeFilter === f.k;
      return `<span class="badge ${f.cls}"
        style="cursor:pointer;padding:5px 12px;font-size:12px;${isActive ? 'box-shadow:0 0 0 2px var(--pk2)' : f.cnt === 0 ? 'opacity:.4' : ''}"
        onclick="S.dashStatusFilter=${f.k === null ? 'null' : `'${f.k}'`};render()"
        >${f.lb} <b>${f.cnt}</b></span>`;
    }).join('');
  }
  document.getElementById('proxy-toggle-txt').textContent = S.showProxy ? '숨김' : '표시';

  // Filtered purchase list
  let fp = purches;
  if (activeFilter) {
    const ds = DISP_STATUSES.find(d => d.k === activeFilter);
    if (ds) fp = purches.filter(p => ds.keys.includes(p.status || 'waiting'));
  }
  const purchListEl = document.getElementById('dash-purch-list');
  if (purchListEl) {
    purchListEl.innerHTML = fp.length
      ? fp.map(p => {
          const store = DB.stores?.find(s => s.id === p.storeId);
          const total = calcPurchTotal(p);
          const proxy = calcProxyTotal(p);
          const items = (p.items || []).filter(it => it.qty > 0);
          const albCounts = items.map(it => {
            const alb = DB.albumTypes?.find(a => a.key === it.albKey);
            return `<span>${alb?.name || it.albKey} <b>${it.qty}</b>장${it.proxyQty > 0 && S.showProxy ? `<span style="color:var(--warn);font-size:10px"> (대리${it.proxyQty})</span>` : ''}</span>`;
          }).join('');
          return `<div class="dash-purch-item">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span class="fw-600">${store?.name || '?'}</span>
                ${store?.isMusicStreamTeam ? '<span class="music-tag">🎵</span>' : ''}
                ${stBadge(p.status || 'waiting')}
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <span class="fw-600 text-sm">${fKRW(total)}</span>
                <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();editPurch('${p.id}')">편집</button>
              </div>
            </div>
            <div style="font-size:12px;color:var(--tx2);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap">
              ${albCounts}
              ${p.orderDate ? `<span style="color:var(--tx3)">${fDate(p.orderDate)}</span>` : ''}
              ${proxy > 0 && S.showProxy ? `<span style="color:var(--warn)">대리 ${fKRW(proxy)}</span>` : ''}
            </div>
            ${p.trackingNumber ? `<div style="font-size:11px;color:var(--tx3);margin-top:3px">📦 ${p.carrier || ''} ${p.trackingNumber}</div>` : ''}
          </div>`;
        }).join('')
      : '<div class="empty" style="padding:20px">구매 기록 없음</div>';
  }

  // Store spend cards (expandable, sortable)
  const storeSpend = {};
  purches.forEach(p => {
    storeSpend[p.storeId] = (storeSpend[p.storeId] || 0) + calcPurchTotal(p);
  });

  ['amount','name','status'].forEach(v => {
    const el = document.getElementById('sort-' + v);
    if (el) el.style.borderColor = S.storeSort === v ? 'var(--pk2)' : '';
  });

  let storeRows = Object.entries(storeSpend);
  if (S.storeSort === 'name') {
    storeRows.sort((a, b) => storeName(a[0]).localeCompare(storeName(b[0]), 'ko'));
  } else if (S.storeSort === 'status') {
    const ORDER = ['delivered','shipped','preparing','ordered','waiting','planned',''];
    storeRows.sort((a, b) => {
      const stA = purches.find(p => p.storeId === a[0])?.status || '';
      const stB = purches.find(p => p.storeId === b[0])?.status || '';
      return ORDER.indexOf(stA) - ORDER.indexOf(stB);
    });
  } else {
    storeRows.sort((a, b) => b[1] - a[1]);
  }

  document.getElementById('dash-store-spend').innerHTML = storeRows.length
    ? storeRows.map(([sid, amt]) => {
        const lastStatus = purches.find(p => p.storeId === sid)?.status || 'waiting';
        return `<div class="spend-card" id="sc-${sid}" onclick="toggleSpend('${sid}')">
          <div class="spend-card-head">
            <span class="fw-600">${storeName(sid)}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="fw-600 text-sm">${fKRW(amt)}</span>
              ${stBadge(lastStatus)}

            </div>
          </div>
          <div class="spend-card-detail" id="scd-${sid}">${buildSpendDetail(sid, purches)}</div>
        </div>`;
      }).join('')
    : '<div class="empty">지출 기록 없음</div>';

  // Unpurchased — list with 영통/음총/한터/deadline
  const purchasedStoreIds = new Set(purches.map(p => p.storeId));
  const unpurchased = stores
    .filter(s => !purchasedStoreIds.has(s.id))
    .filter(s => !S.hideExpired || !isExpired(s));
  document.getElementById('hide-exp-txt').textContent = S.hideExpired ? '마감 포함' : '마감 숨김';

  document.getElementById('dash-unpurchased').innerHTML = unpurchased.length
    ? `<div style="display:flex;flex-direction:column;gap:4px">
        ${unpurchased.map(s => {
          const deadline = fDeadline(s);
          const expired = isExpired(s);
          return `<div class="unpurchased-row" onclick="addPurchModal('${s.id}')">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
              <span class="fw-600" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</span>
              ${s.isMusicStreamTeam ? '<span class="music-tag" style="flex-shrink:0">🎵</span>' : ''}
              ${s.videocall ? '<span style="font-size:13px;flex-shrink:0" title="영통">📞</span>' : ''}
              ${s.hanteoChart ? '<span style="font-size:11px;background:rgba(96,165,250,.15);color:var(--info);padding:1px 5px;border-radius:3px;flex-shrink:0">한터</span>' : ''}

}

  const storePurches = purches.filter(p => p.storeId === sid);
  const store = DB.stores?.find(s => s.id === sid);
  if (!storePurches.length) return '<div class="empty">구매 기록 없음</div>';
  return storePurches.map(p => {
    const total = calcPurchTotal(p);
    const items = (p.items || []).filter(it => it.qty > 0);
    const extras = [
      p.domShip ? `배송 ${fKRW(p.domShip)}` : '',
      p.intlShip ? `국제 ${fKRW(p.intlShip)}` : '',
      p.fwdFee ? `포워딩 ${fKRW(p.fwdFee)}` : '',
      p.customs ? `관세 ${fKRW(p.customs)}` : '',
      p.discount ? `할인 -${fKRW(p.discount)}` : '',
    ].filter(Boolean);
    return `<div style="padding:10px 0;border-bottom:1px solid var(--bd)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <div style="display:flex;gap:6px;align-items:center">
          ${stBadge(p.status || 'waiting')}
          ${p.orderDate ? `<span class="text-xs text-muted">${fDate(p.orderDate)}</span>` : ''}
          ${p.orderNumber ? `<span class="text-xs text-muted">#${p.orderNumber}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="fw-600 text-sm">${fKRW(total)}</span>
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();editPurch('${p.id}')">편집</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--tx2);display:flex;gap:8px;flex-wrap:wrap">
        ${items.map(it => {
          const alb = DB.albumTypes?.find(a => a.key === it.albKey);
          return `<span>${alb?.name || it.albKey} ${it.qty}장</span>`;
        }).join('')}
      </div>

      ${p.trackingNumber ? `<div style="font-size:11px;color:var(--tx3);margin-top:3px">📦 ${p.carrier || ''} ${p.trackingNumber}</div>` : ''}
    </div>`;
  }).join('');
}

  const open = detail.classList.toggle('open');
  card.classList.toggle('expanded', open);
}

function showStatusDetail(key) {
  const cat = getCat();
  const stores = catStores();
  const purches = (DB.purchases || []).filter(p => {
    const st = DB.stores?.find(s => s.id === p.storeId);
    return st?.categoryId === S.catId;
  });

  const ds = DISP_STATUSES.find(d => d.k === key);
  document.getElementById('modal-detail-title').textContent = ds ? ds.lb + ' 상세' : '상세';

  let html = '';
  if (key === 'none') {
    const purchasedIds = new Set(purches.map(p => p.storeId));
    const unpurchased = stores.filter(s => !purchasedIds.has(s.id));
    html = unpurchased.length
      ? `<div style="margin-bottom:10px;font-size:13px;color:var(--tx2)">총 ${unpurchased.length}개 판매처 미구매</div>` +
        unpurchased.map(s => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)">
            <div>
              <span class="fw-600">${s.name}</span>
              ${s.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : ''}
              <div class="text-xs text-muted">${fDate(s.purchaseStart, true)} ~ ${s.purchaseEnd ? fDate(s.purchaseEnd, true) : (s.purchaseEndTxt || '미정')}</div>
            </div>
            <button class="btn btn-p btn-xs" onclick="closeModal('modal-detail');addPurchModal('${s.id}')">+ 구매 추가</button>
          </div>`).join('')
      : '<div class="empty">모든 판매처에서 구매했습니다</div>';
  } else {
    const keys = ds?.keys || [];
    let matched = purches.filter(p => keys.includes(p.status || 'waiting'));
    if (!matched.length) matched = purches.filter(p => {
      const st = p.status || 'waiting';
      if (key === 'shipping') return ['preparing','shipped'].includes(st);
      return st === key;
    });
    html = matched.length
      ? matched.map(p => {
          const total = calcPurchTotal(p);
          const items = (p.items || []).map(it => {
            const alb = DB.albumTypes?.find(a => a.key === it.albKey);
            return `${alb?.name || it.albKey} ${it.qty}장`;
          }).join(', ');
          return `<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);gap:8px">
            <div style="flex:1">
              <div class="fw-600">${storeName(p.storeId)}</div>
              <div class="text-sm text-muted">${items}</div>
              ${p.orderDate ? `<div class="text-xs text-muted">${fDate(p.orderDate)}</div>` : ''}

            <div style="text-align:right">
              <div class="fw-600">${fKRW(total)}</div>
              ${stBadge(p.status || 'waiting')}
              <div style="margin-top:4px"><button class="btn btn-ghost btn-xs" onclick="closeModal('modal-detail');editPurch('${p.id}')">편집</button></div>
            </div>
          </div>`;
        }).join('')
      : '<div class="empty">해당 상태의 구매 기록 없음</div>';
  }
  document.getElementById('modal-detail-body').innerHTML = html;
  openModal('modal-detail');
}

function showAlbumDetail(albKey) {
  const alb = DB.albumTypes?.find(a => a.key === albKey);

          </div>

            ${stBadge(p.status || 'waiting')}

}

// PURCHASE LIST
// ═══════════════════════════════════════════
function renderPurch() {
  const search = document.getElementById('purch-search')?.value.toLowerCase() || '';
  const statusF = document.getElementById('purch-status-filter')?.value || '';
  const catF = document.getElementById('purch-cat-filter')?.value || '';

  let purches = DB.purchases || [];

  if (catF) {
    purches = purches.filter(p => {
      const st = DB.stores?.find(s => s.id === p.storeId);
      return st?.categoryId === catF;
    });
  } else if (S.catId) {
    purches = purches.filter(p => {
      const st = DB.stores?.find(s => s.id === p.storeId);
      return st?.categoryId === S.catId;
    });
  }

  if (statusF) purches = purches.filter(p => p.status === statusF);
  if (search) purches = purches.filter(p =>
    storeName(p.storeId).toLowerCase().includes(search) ||
    (p.memo || '').toLowerCase().includes(search) ||
    (p.orderNumber || '').toLowerCase().includes(search)
  );

  purches = [...purches].sort((a, b) => {
    if (S.purchSort === 'total') return calcPurchTotal(b) - calcPurchTotal(a);
    return new Date(b.orderDate || b.createdAt || 0) - new Date(a.orderDate || a.createdAt || 0);
  });

  document.getElementById('purch-sort-txt').textContent = S.purchSort === 'date' ? '날짜' : '금액';

  const total = purches.reduce((s, p) => s + calcPurchTotal(p), 0);
  const myTotal = total - purches.reduce((s, p) => s + calcProxyTotal(p), 0);
  document.getElementById('purch-total-bar').innerHTML = purches.length
    ? `<div class="flex gap-12" style="padding:8px 12px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r-sm)">
        <span class="text-muted text-sm">${purches.length}건</span>
        <span class="text-sm fw-600">총 ${fKRW(total)}</span>
        <span class="text-sm text-muted">내 지출 ${fKRW(myTotal)}</span>
      </div>` : '';

  document.getElementById('purch-list').innerHTML = purches.length
    ? purches.map(p => renderPurchCard(p)).join('')
    : '<div class="empty">구매 기록이 없습니다.<br><br><button class="btn btn-p" onclick="addPurchModal()">+ 구매 추가</button></div>';
}

function renderPurchCard(p) {
  const store = DB.stores?.find(s => s.id === p.storeId);
  const cat = store ? getCat(store.categoryId) : null;
  const total = calcPurchTotal(p);
  const proxyTotal = calcProxyTotal(p);
  const myTotal = total - proxyTotal;
  const ovs = store ? isOvs(store) : false;
  const cur = store ? getStoreCur(store) : 'KRW';

  const STATUS_STEPS = ['planned', 'waiting', 'ordered', 'preparing', 'shipped', 'delivered'];
  const stepIdx = STATUS_STEPS.indexOf(p.status || 'waiting');

  const itemsHtml = (p.items || []).map(it => {
    const alb = DB.albumTypes?.find(a => a.key === it.albKey);
    const pr = it.unitPrice > 0 ? it.unitPrice : (store ? storePrice(store, it.albKey) : 0);
    return `<tr>
      <td>${alb?.name || it.albKey}</td>
      <td>${it.qty || 0}장</td>
      <td>${pr ? (ovs ? (COUNTRIES[store.country]?.cur?.slice(0,2) || '') + Number(pr).toLocaleString() : fKRW(pr * (it.qty || 0))) : '—'}</td>
      ${it.proxyQty ? `<td class="text-warn">${it.proxyQty}장 대리</td>` : '<td>-</td>'}
    </tr>`;
  }).join('');

  const delivSteps = p.status === 'cancelled' ? '' : `
    <div class="delivery-steps" style="margin:10px 0">
      ${STATUS_STEPS.slice(1).map((st, i) => {
        const done = stepIdx > i + 1;
        const current = stepIdx === i + 1;
        return `<div class="delivery-step ${done ? 'done' : current ? 'current' : ''}">
          <div class="delivery-dot"></div>
          <div class="delivery-label">${STATUS_MAP[st].lb}</div>
        </div>`;
      }).join('')}
    </div>`;

  return `<div class="purch-card">
    <div class="purch-card-header">
      <div>
        <div class="purch-store-name">${store?.name || '?'} ${store?.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : ''}</div>
        <div class="purch-meta">
          ${cat ? cat.name + ' · ' : ''}
          ${p.orderDate ? fDate(p.orderDate) : '날짜미입력'}
          ${p.orderNumber ? `· <span class="mono text-xs">${p.orderNumber}</span>` : ''}
        </div>
      </div>
      <div class="flex gap-8 flex-1" style="justify-content:flex-end;align-items:flex-start">
        ${stBadge(p.status || 'waiting')}
        <div>
          <div class="price-total">${fKRW(total)}</div>
          ${proxyTotal ? `<div class="text-xs text-muted">내 지출: ${fKRW(myTotal)}</div>` : ''}
        </div>
        <button class="btn btn-ghost btn-xs" onclick="editPurch('${p.id}')">편집</button>
        <button class="btn btn-err btn-xs" onclick="deletePurch('${p.id}')">삭제</button>
      </div>
    </div>

    ${delivSteps}

    <table class="purch-items-table" style="width:100%;border-collapse:collapse;margin-bottom:8px">
      <thead><tr style="background:var(--sur2)">
        <th style="padding:5px 8px;font-size:11px;text-align:left">앨범</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left">수량</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left">금액</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left">대리구매</th>
      </tr></thead>
      <tbody>${itemsHtml}</tbody>
    </table>

    ${(p.domShip || p.intlShip || p.fwdFee || p.customs || p.discount) ? `
      <div style="font-size:12px;color:var(--tx2);display:flex;gap:12px;flex-wrap:wrap">
        ${p.domShip ? `<span>국내배송 +${fKRW(p.domShip)}</span>` : ''}
        ${p.intlShip ? `<span>국제배송 +${fKRW(p.intlShip)}</span>` : ''}
        ${p.fwdFee ? `<span>포워딩 +${fKRW(p.fwdFee)}</span>` : ''}
        ${p.customs ? `<span>관세 +${fKRW(p.customs)}</span>` : ''}
        ${p.discount ? `<span class="text-ok">할인 -${fKRW(p.discount)}</span>` : ''}
      </div>
    ` : ''}

    ${p.trackingNumber ? `
      <div style="margin-top:8px;font-size:12px">
        📦 ${p.carrier || '택배'}: <code>${p.trackingNumber}</code>
        ${p.shippedAt ? ` · 발송 ${fDate(p.shippedAt)}` : ''}
        ${p.deliveredAt ? ` · 수령 ${fDate(p.deliveredAt)}` : ''}
      </div>
    ` : ''}

    ${p.memo ? `<div style="margin-top:8px;font-size:12px;color:var(--tx2);white-space:pre-wrap">${p.memo}</div>` : ''}

    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      ${['ordered','preparing','shipped','delivered'].map(st =>
        `<button class="btn btn-ghost btn-xs" style="${(p.status||'waiting')===st?'border-color:var(--pk2);color:var(--pk)':''}" onclick="setPurchStatus('${p.id}','${st}')">${STATUS_MAP[st].lb}</button>`
      ).join('')}
    </div>
  </div>`;
}

function setPurchStatus(id, status) {
  const patch = { status };
  if (status === 'delivered') patch.deliveredAt = patch.deliveredAt || new Date().toISOString().slice(0,10);
  if (status === 'shipped') patch.shippedAt = patch.shippedAt || new Date().toISOString().slice(0,10);
  dbUpdateItem('purchases', id, patch);
  render();
  toast('상태 업데이트: ' + STATUS_MAP[status].lb);
}

function deletePurch(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  dbDeleteItem('purchases', id);
  render();
  toast('삭제되었습니다.', 'warn');
}

}

function buildPurchModal(p) {
  const isEdit = !!p;

      <td style="padding:6px 4px"><input type="number" min="0" value="${item.proxyQty || 0}" style="width:60px" id="item-proxy-${a.key}"></td>

    <div class="form-row cols-2">
      <div>
        <label>판매처 *</label>
        <select id="mp-store" onchange="updatePurchPrices()">
          <option value="">선택하세요</option>

      <div>
        <label>주문번호</label>
        <input type="text" id="mp-ordno" placeholder="주문번호" value="${p?.orderNumber || ''}">
      </div>
      <div>
        <label>상태</label>
        <select id="mp-status">
          ${Object.entries(STATUS_MAP).map(([k,v]) => `<option value="${k}" ${(p?.status||'waiting')===k?'selected':''}>${v.lb}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="section-divider">앨범 수량 및 가격</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:12px">
      <thead><tr style="background:var(--sur2)">
        <th style="padding:6px 8px;font-size:11px;text-align:left">앨범</th>
        <th style="padding:6px 8px;font-size:11px;text-align:left">수량</th>
        <th style="padding:6px 8px;font-size:11px;text-align:left">단가(${ovs ? getStoreCur(selectedStore) : '₩'})</th>
        <th style="padding:6px 8px;font-size:11px;text-align:left">대리구매수량</th>
      </tr></thead>
      <tbody id="mp-items">${itemRows}</tbody>

    <div class="form-row cols-3">
      <div><label>국내배송비 (₩)</label><input type="number" min="0" id="mp-domship" value="${p?.domShip || 0}"></div>
      ${ovs ? `
        <div><label>국제배송비 (₩)</label><input type="number" min="0" id="mp-intlship" value="${p?.intlShip || 0}"></div>
        <div><label>포워딩 수수료 (₩)</label><input type="number" min="0" id="mp-fwdfee" value="${p?.fwdFee || 0}"></div>
      ` : '<div></div><div></div>'}
    </div>
    <div class="form-row cols-3">
      ${ovs ? `<div><label>관세 (₩)</label><input type="number" min="0" id="mp-customs" value="${p?.customs || 0}"></div>` : '<div></div>'}
      <div><label>할인 (₩)</label><input type="number" min="0" id="mp-discount" value="${p?.discount || 0}"></div>
      ${ovs ? `<div><label>직접입력 KRW (0=자동)</label><input type="number" min="0" id="mp-directkrw" value="${p?.directKrw || 0}"></div>` : '<div></div>'}
    </div>
    ${ovs ? `
      <div class="form-row">
        <div><label>외화 총액 (${getStoreCur(selectedStore) || 'foreign'}, 0=자동)</label>
          <input type="number" min="0" id="mp-foreign" value="${p?.foreignTotal || 0}"></div>

    <div class="form-row">
      <div><label>메모</label><textarea id="mp-memo" rows="2">${p?.memo || ''}</textarea></div>
    </div>
  `;
}

function updatePurchPrices() {
  const storeId = document.getElementById('mp-store')?.value;
  const store = DB.stores?.find(s => s.id === storeId);
  if (!store) return;
  const albums = getCatAlbums();
  albums.forEach(a => {
    const pr = storePrice(store, a.key);
    const input = document.getElementById('item-price-' + a.key);
    if (input && !input.value) input.placeholder = pr ? pr.toString() : '가격입력';
    if (input && !input._userEdited && pr) input.value = pr;
  });
}

function updatePurchItemPrice(albKey) { /* price auto-fill handled in build */ }

function savePurch() {
  const storeId = document.getElementById('mp-store')?.value;
  if (!storeId) { toast('판매처를 선택하세요.', 'warn'); return; }

  const store = DB.stores?.find(s => s.id === storeId);
  const albums = getCatAlbums();

  const items = albums.map(a => ({
    albKey: a.key,
    qty: parseInt(document.getElementById('item-qty-' + a.key)?.value || '0'),
    unitPrice: parseFloat(document.getElementById('item-price-' + a.key)?.value || '0'),
    proxyQty: parseInt(document.getElementById('item-proxy-' + a.key)?.value || '0'),
  })).filter(it => it.qty > 0);

  const purch = {
    storeId,
    items,
    orderDate: document.getElementById('mp-date')?.value || '',
    orderNumber: document.getElementById('mp-ordno')?.value || '',
    status: document.getElementById('mp-status')?.value || 'waiting',
    domShip: parseFloat(document.getElementById('mp-domship')?.value || '0'),
    intlShip: parseFloat(document.getElementById('mp-intlship')?.value || '0'),
    fwdFee: parseFloat(document.getElementById('mp-fwdfee')?.value || '0'),
    customs: parseFloat(document.getElementById('mp-customs')?.value || '0'),
    discount: parseFloat(document.getElementById('mp-discount')?.value || '0'),
    directKrw: parseFloat(document.getElementById('mp-directkrw')?.value || '0'),
    foreignTotal: parseFloat(document.getElementById('mp-foreign')?.value || '0'),
    proxyKrw: parseFloat(document.getElementById('mp-proxykrw')?.value || '0'),
    carrier: document.getElementById('mp-carrier')?.value || '',
    trackingNumber: document.getElementById('mp-tracking')?.value || '',
    shippedAt: document.getElementById('mp-shipdate')?.value || '',
    deliveredAt: document.getElementById('mp-delivdate')?.value || '',
    memo: document.getElementById('mp-memo')?.value || '',
    createdAt: new Date().toISOString(),
  };

  if (S.editPurchId) {
    dbUpdateItem('purchases', S.editPurchId, purch);
    toast('구매 기록 수정됨');
  } else {
    dbInsert('purchases', purch);
    toast('구매 기록 추가됨');
  }
  closeModal('modal-purch');
  render();
}

// STORES
// ═══════════════════════════════════════════
function renderStores() {
  const albums = getCatAlbums();
  const search = document.getElementById('store-search')?.value.toLowerCase() || '';
  const countryF = document.getElementById('store-country-filter')?.value || '';
  const albF = document.getElementById('store-alb-filter')?.value || S.albKey || '';
  const showEnded = document.getElementById('store-show-ended')?.checked || false;
  const musicOnly = document.getElementById('store-music-only')?.checked || false;

  // Album tabs
  const tabsEl = document.getElementById('stores-alb-tabs');
  if (tabsEl) {
    tabsEl.innerHTML = `<button class="alb-chip${!albF ? ' active' : ''}" onclick="S.albKey='';render()">전체</button>` +
      albums.map(a => `<button class="alb-chip${albF===a.key ? ' active' : ''}" onclick="S.albKey='${a.key}';render()">${a.name}</button>`).join('');
  }

  let stores = catStores();
  if (search) stores = stores.filter(s => s.name.toLowerCase().includes(search));
  if (countryF) stores = stores.filter(s => s.country === countryF);
  if (albF) stores = stores.filter(s => s.unpoAlbumKey === albF || (s.priceMode === 'country') || (s.customPrices && albF in s.customPrices && s.customPrices[albF] !== null));
  if (!showEnded) stores = stores.filter(s => !isExpired(s));
  if (musicOnly) stores = stores.filter(s => s.isMusicStreamTeam);

  const grid = document.getElementById('stores-grid');
  grid.innerHTML = stores.length
    ? stores.map(s => renderStoreCard(s)).join('')
    : '<div class="empty" style="grid-column:1/-1">조건에 맞는 판매처가 없습니다</div>';
}

function renderStoreCard(s) {
  const dist = distName(s.distId);
  const country = COUNTRIES[s.country];
  const expired = isExpired(s);
  const albums = getCatAlbums(s.categoryId);

  const priceRows = albums.map(a => {
    const pr = storePrice(s, a.key);
    if (pr === null) return '';
    const cur = getStoreCur(s);
    const prKRW = isOvs(s) ? toKRW(pr, cur) : pr;
    return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0">
      <span class="text-muted">${a.name}</span>
      <span class="fw-600">${isOvs(s) ? `${cur} ${Number(pr).toLocaleString()} (${fKRW(prKRW)})` : fKRW(pr)}</span>
    </div>`;
  }).filter(Boolean).join('');

  return `<div class="card" style="margin-bottom:0;${expired ? 'opacity:.55' : ''}cursor:pointer" onclick="showStoreDetail('${s.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">
      <div>
        <div class="fw-600">${s.name}${expired ? ' <span class="badge badge-gray" style="font-size:10px">마감</span>' : ''}</div>
        <div class="text-sm text-muted">${dist ? dist + ' · ' : ''}${country?.flag || ''} ${country?.lb || s.country}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        ${s.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : ''}
        ${s.round ? `<span class="badge badge-info">${s.round}차</span>` : ''}
        ${s.unpoAlbumKey ? `<span class="badge badge-pk" style="font-size:10px">미공포</span>` : ''}
        ${s.videocall ? '<span title="영통" style="font-size:14px">📞</span>' : ''}
        ${s.offlineLuckyDraw ? '<span title="럭키드로우" style="font-size:14px">🎰</span>' : ''}
      </div>
    </div>

    <div style="margin-bottom:8px">${priceRows}</div>

    <div style="font-size:11px;color:var(--tx3)">
      ${s.purchaseStart ? '구매: ' + fDate(s.purchaseStart, true) + ' ~ ' + (s.purchaseEnd ? fDate(s.purchaseEnd, true) : (s.purchaseEndTxt || '미정')) : ''}

  </div>`;
}

      <div class="store-detail-row"><div class="store-detail-label">구매 종료</div><div class="store-detail-val">${s.purchaseEnd ? fDate(s.purchaseEnd, true) : (s.purchaseEndTxt || '미정')}</div></div>
      <div class="store-detail-row"><div class="store-detail-label">국내배송비</div><div class="store-detail-val">${s.defDomShip > 0 ? fKRW(s.defDomShip) : '무료'}</div></div>
      <div class="store-detail-row"><div class="store-detail-label">배송예정일</div><div class="store-detail-val">${s.defDeliveryDate ? fDate(s.defDeliveryDate) : '미정'}</div></div>
    </div>

    ${s.offlineStart ? `

        <div class="store-detail-row"><div class="store-detail-label">오프라인 기간</div><div class="store-detail-val">${fDate(s.offlineStart)} ~ ${fDate(s.offlineEnd)}</div></div>
        <div class="store-detail-row"><div class="store-detail-label">운영시간</div><div class="store-detail-val">${s.offlineHours || '—'}</div></div>
      </div>

// ═══════════════════════════════════════════
// UNPO
// ═══════════════════════════════════════════
function renderUnpo() {
  const albums = getCatAlbums();
  const albKey = S.unpoAlbKey || (albums[0]?.key || '');
  const search = document.getElementById('unpo-search')?.value.toLowerCase() || '';
  const ownedOnly = document.getElementById('unpo-owned-only')?.checked || false;

  // Album tabs
  const tabsEl = document.getElementById('unpo-alb-tabs');
  if (tabsEl) {
    tabsEl.innerHTML = albums.map(a =>
      `<button class="alb-chip${albKey===a.key ? ' active' : ''}" onclick="S.unpoAlbKey='${a.key}';render()">${a.name}</button>`
    ).join('');
    if (!S.unpoAlbKey && albums.length) S.unpoAlbKey = albums[0].key;
  }

  // Get stores with unpo for this album key
  const stores = catStores().filter(s => s.unpoAlbumKey === albKey);

  const html = stores.filter(s => !search || s.name.toLowerCase().includes(search)).map(s => {
    const unpo = dbGetUnpoCards(s.id, albKey);

    // Purchase linkage badge
    const storePurch = (DB.purchases || []).find(p => p.storeId === s.id);
    const purchBadge = storePurch
      ? stBadge(storePurch.status || 'waiting') +
        (() => {
          const qty = (storePurch.items || []).filter(i => i.albKey === albKey && i.qty > 0).reduce((s, i) => s + i.qty, 0);
          return qty ? `<span class="text-sm text-muted" style="margin-left:4px">${qty}장</span>` : '';
        })()
      : '<span class="badge badge-gray">미구매</span>';

    if (!unpo || !unpo.sets?.length) {
      return `<div class="card" style="margin-bottom:12px">
        <div class="card-header">
          <div class="fw-600">${s.name} <span class="text-muted text-sm">미공포 없음</span></div>
          <div style="display:flex;gap:6px;align-items:center">${purchBadge}</div>
        </div>
      </div>`;
    }

    const setsHtml = unpo.sets.map((set, si) => {
      const cards = set.cards || [];
      const ownedCount = cards.filter(c => c.owned).length;
      const cardsHtml = cards.map((c, ci) => {
        if (ownedOnly && !c.owned) return '';
        return `<div class="unpo-card-wrap">
          <div class="unpo-card${c.owned ? ' owned' : ''}" onclick="toggleUnpoOwned('${s.id}','${albKey}',${si},${ci})">
            ${c.img ? `<img src="${c.img}" loading="lazy">` : '<div class="no-img">📷<br>미등록</div>'}
            ${c.owned ? '<div class="unpo-owned-badge">보유</div>' : ''}
          </div>
          ${c.note ? `<div style="font-size:10px;color:var(--tx3);text-align:center">${c.note}</div>` : ''}
        </div>`;
      }).filter(Boolean).join('');

      if (!cardsHtml) return '';
      return `<div style="margin-bottom:12px">
        ${set.memo ? `<div style="font-size:12px;color:var(--tx2);margin-bottom:6px">${set.memo}</div>` : ''}
        <div style="font-size:11px;color:var(--tx3);margin-bottom:6px">${ownedCount}/${cards.length} 보유</div>
        <div class="unpo-grid${s.unpoBack || cards.length > 5 ? ' six' : ''}">${cardsHtml}</div>
      </div>`;
    }).filter(Boolean).join('');

    const totalCards = unpo.sets.reduce((s, set) => s + (set.cards?.length || 0), 0);
    const ownedCards = unpo.sets.reduce((s, set) => s + (set.cards?.filter(c => c.owned).length || 0), 0);

    return `<div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <div class="fw-600">${s.name}${s.sharedWith ? ` <span class="badge badge-gray" style="font-size:10px">→ ${s.sharedWith.bn} (${s.sharedWith.ak})와 동일</span>` : ''}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${purchBadge}
          <span class="badge ${ownedCards === totalCards && totalCards > 0 ? 'badge-ok' : 'badge-gray'}">${ownedCards}/${totalCards}</span>
        </div>
      </div>
      ${setsHtml || '<div class="empty">카드 정보 없음</div>'}
    </div>`;
  }).join('');

  document.getElementById('unpo-content').innerHTML = html || '<div class="empty">미공포 정보가 없습니다.<br>관리자에서 등록하세요.</div>';
}

function toggleUnpoOwned(storeId, albKey, si, ci) {
  const s = dbGet();
  const ucIdx = (s.unpoCards || []).findIndex(uc => uc.storeId === storeId && uc.albumTypeId === albKey);
  if (ucIdx < 0) return;
  const newUnpo = JSON.parse(JSON.stringify(s.unpoCards));
  const card = newUnpo[ucIdx]?.sets?.[si]?.cards?.[ci];
  if (card) {
    card.owned = !card.owned;
    dbUpdate(st => ({ ...st, unpoCards: newUnpo }));
    DB = dbGet();
    render();
  }
}

// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
function renderCal() {
  const y = S.calYear, m = S.calMonth;
  const today = new Date();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-title').textContent = y + '년 ' + monthNames[m];

  const showPur = document.getElementById('cal-show-pur')?.checked !== false;
  const showOff = document.getElementById('cal-show-off')?.checked !== false;
  const showDel = document.getElementById('cal-show-del')?.checked !== false;

  // Days header
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('cal-header-row').innerHTML = days.map(d =>
    `<div class="cal-header-cell">${d}</div>`
  ).join('');

  // Build events map
  const events = {}; // date string -> [{type, label, color}]
  const addEvent = (dateStr, ev) => {
    if (!events[dateStr]) events[dateStr] = [];
    events[dateStr].push(ev);
  };

  const cat = getCat();

  // Release date
  if (cat?.releaseDate) {
    addEvent(cat.releaseDate, { type: 'release', label: '🎵 발매일: ' + cat.name });
  }

  const stores = catStores();
  stores.forEach(s => {
    if (showPur) {
      if (s.purchaseStart) addEvent(s.purchaseStart.slice(0,10), { type: 'purchase', label: '🛒 시작: ' + s.name });
      if (s.purchaseEnd) addEvent(s.purchaseEnd.slice(0,10), { type: 'purchase', label: '🛒 마감: ' + s.name });
    }
    if (showOff) {
      if (s.offlineStart) addEvent(s.offlineStart.slice(0,10), { type: 'offline', label: '🏪 오프: ' + s.name });
      if (s.offlineEnd && s.offlineEnd !== s.offlineStart) addEvent(s.offlineEnd.slice(0,10), { type: 'offline', label: '🏪 오프끝: ' + s.name });
    }
  });

  if (showDel) {
    const purches = (DB.purchases || []).filter(p => {
      const st = DB.stores?.find(s => s.id === p.storeId);
      return st?.categoryId === S.catId;
    });
    purches.forEach(p => {
      const store = DB.stores?.find(s => s.id === p.storeId);
      const delivDate = p.deliveredAt || store?.defDeliveryDate;
      if (delivDate) addEvent(delivDate.slice(0,10), { type: 'delivery', label: '📦 ' + storeName(p.storeId) });
    });
  }

  // 초동기간 helper
  const releaseDate = cat?.releaseDate ? new Date(cat.releaseDate + 'T00:00:00') : null;
  function chodongCls(dateStr) {
    if (!releaseDate) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((d - releaseDate) / 86400000);
    if (diff === 0) return 'chodong-release';
    if (diff > 0 && diff <= 6) return 'chodong';
    if (diff === 7) return 'chodong-dday';
    return '';
  }
  function ddayLabel(dateStr) {
    if (!releaseDate) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((d - releaseDate) / 86400000);
    if (diff === 0) return '<span style="font-size:9px;color:var(--pk);font-weight:700">발매</span>';
    if (diff > 0 && diff <= 7) return `<span style="font-size:9px;color:var(--warn)">+${diff}일</span>`;
    return '';
  }

  // Build calendar grid
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();

  let cells = '';
  let totalCells = 42;
  for (let i = 0; i < totalCells; i++) {
    let day, isOther = false, dateStr;
    if (i < firstDay) {
      day = daysInPrev - firstDay + i + 1;
      isOther = true;
      dateStr = new Date(y, m - 1, day).toISOString().slice(0, 10);
    } else if (i - firstDay >= daysInMonth) {
      day = i - firstDay - daysInMonth + 1;
      isOther = true;
      dateStr = new Date(y, m + 1, day).toISOString().slice(0, 10);
    } else {
      day = i - firstDay + 1;
      dateStr = new Date(y, m, day).toISOString().slice(0, 10);
    }

    const isToday = dateStr === today.toISOString().slice(0, 10);
    const isSelected = dateStr === S.calDay;
    const evs = (events[dateStr] || []).slice(0, 3);
    const chodong = chodongCls(dateStr);

    cells += `<div class="cal-cell${isOther ? ' other-month' : ''}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}${chodong ? ' ' + chodong : ''}"
      onclick="calSelectDay('${dateStr}')">
      <div class="cal-day-num" style="display:flex;justify-content:space-between;align-items:center">
        <span>${day}</span>${ddayLabel(dateStr)}
      </div>
      ${evs.map(ev => `<div class="cal-event ${ev.type}">${ev.label}</div>`).join('')}
      ${(events[dateStr] || []).length > 3 ? `<div style="font-size:9px;color:var(--tx3)">+${(events[dateStr]||[]).length-3}</div>` : ''}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML = cells;

  // Day detail
  if (S.calDay && events[S.calDay]) {
    const dayEvents = events[S.calDay];
    document.getElementById('cal-day-detail').innerHTML = `
      <div class="cal-day-panel">
        <div class="fw-600" style="margin-bottom:8px">${S.calDay} 일정 (${dayEvents.length}건)</div>
        ${dayEvents.map(ev => `<div class="cal-event ${ev.type}" style="font-size:12px;margin-bottom:4px">${ev.label}</div>`).join('')}
      </div>
      <div class="cal-legend">
        ${cat?.releaseDate ? '<span class="cal-legend-item chodong-release">발매일</span><span class="cal-legend-item chodong">초동기간</span><span class="cal-legend-item chodong-dday">초동마감</span>' : ''}
        <span class="cal-legend-item purchase">구매기간</span>
        <span class="cal-legend-item offline">오프라인</span>
        <span class="cal-legend-item delivery">배송예정</span>
      </div>`;
  } else {
    document.getElementById('cal-day-detail').innerHTML = cat?.releaseDate ? `
      <div class="cal-legend">
        <span class="cal-legend-item chodong-release">발매일</span>
        <span class="cal-legend-item chodong">초동기간</span>
        <span class="cal-legend-item chodong-dday">초동마감</span>
        <span class="cal-legend-item purchase">구매기간</span>
        <span class="cal-legend-item offline">오프라인</span>
        <span class="cal-legend-item delivery">배송예정</span>
      </div>` : '';
  }
}

function calSelectDay(dateStr) { S.calDay = S.calDay === dateStr ? null : dateStr; render(); }
function calPrev() { if (S.calMonth === 0) { S.calMonth = 11; S.calYear--; } else S.calMonth--; render(); }
function calNext() { if (S.calMonth === 11) { S.calMonth = 0; S.calYear++; } else S.calMonth++; render(); }
function calToday() { S.calYear = new Date().getFullYear(); S.calMonth = new Date().getMonth(); S.calDay = new Date().toISOString().slice(0,10); render(); }

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function openModal(id) { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.modal-bg').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.open').forEach(el => closeModal(el.id));
});

// ═══════════════════════════════════════════
// NOTICE POPUP
// ═══════════════════════════════════════════
function checkNoticePopup() {
  const notices = (DB.notices || []).filter(n => n.visible);
  if (!notices.length) return;
  const latest = notices.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.createdAt) - new Date(a.createdAt))[0];
  const dismissed = JSON.parse(localStorage.getItem('albumapp_noticed') || '{}');
  const ts = dismissed[latest.id];
  if (ts && Date.now() - ts < 72 * 3600 * 1000) return;
  document.getElementById('np-title').textContent = latest.title;
  document.getElementById('np-body').textContent = latest.body || '';
  document.getElementById('notice-popup').style.display = 'flex';
  window._currentNoticeId = latest.id;
}

function dismissNotice(permanent) {
  if (permanent && window._currentNoticeId) {
    const dismissed = JSON.parse(localStorage.getItem('albumapp_noticed') || '{}');
    dismissed[window._currentNoticeId] = Date.now();
    localStorage.setItem('albumapp_noticed', JSON.stringify(dismissed));
  }
  document.getElementById('notice-popup').style.display = 'none';
}
