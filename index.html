<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>앨범 구매관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="css/app.css">
<style>
/* ── inline overrides ── */
.purch-items-table td { padding: 5px 8px; font-size: 12px; }
.purch-items-table th { padding: 5px 8px; font-size: 11px; }
.store-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
.store-detail-row { display: flex; flex-direction: column; gap: 2px; }
.store-detail-label { font-size: 11px; color: var(--tx3); }
.store-detail-val { color: var(--tx); }
.cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.cal-nav-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }
.cal-day-panel { background: var(--sur2); border-radius: var(--r); padding: 14px; margin-top: 12px; }
.price-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--bd); }
.price-row:last-child { border: none; }
.total-price-row { font-weight: 700; font-size: 15px; padding-top: 8px; }
.section-divider { font-size: 11px; color: var(--tx3); letter-spacing: .06em; text-transform: uppercase; padding: 12px 0 6px; font-weight: 600; }
</style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Hamburger button (mobile) -->
<button id="menu-btn" class="menu-btn" onclick="toggleSidebar()" aria-label="메뉴">☰</button>

<!-- Settings button -->
<button class="settings-btn" onclick="openSettings()" title="설정">⚙</button>

<!-- Settings panel -->
<div id="settings-panel" class="settings-panel">
  <div class="settings-panel-head">
    <span style="font-weight:600;font-size:15px">설정</span>
    <button onclick="closeSettings()" style="background:none;border:none;color:var(--tx2);font-size:18px;line-height:1;cursor:pointer">✕</button>
  </div>
  <div class="settings-panel-body">
    <div class="section-divider">테마</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" id="theme-btn-light" onclick="setTheme('light')">☀️ 라이트</button>
      <button class="btn btn-ghost btn-sm" id="theme-btn-dark" onclick="setTheme('dark')">🌙 다크</button>
    </div>
    <div class="section-divider" style="display:flex;align-items:center;justify-content:space-between">
      <span>환율</span>
      <span id="rate-updated-label" style="font-size:10px;color:var(--tx3)"></span>
    </div>
    <div id="settings-rates" style="margin-bottom:8px"></div>
    <button class="btn btn-ghost btn-sm" onclick="fetchRatesIndex()" style="margin-bottom:4px">🔄 환율 자동 갱신</button>
    <div class="section-divider">데이터 백업</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportDB()">⬇ 내보내기</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">⬆ 불러오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importDB(this)">
    </div>

  </div>
</div>
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Notice popup -->
<div id="notice-popup" class="notice-popup" style="display:none">
  <div class="notice-popup-inner">
    <div class="notice-popup-title" id="np-title"></div>
    <div class="notice-popup-body" id="np-body"></div>
    <div class="notice-popup-foot">
      <button class="btn btn-ghost btn-sm" onclick="dismissNotice(true)">3일간 안보기</button>
      <button class="btn btn-p btn-sm" onclick="dismissNotice(false)">닫기</button>
    </div>
  </div>
</div>

<div class="app-layout">
<!-- ── Sidebar ── -->
<nav class="sidebar" id="sidebar">
  <div class="logo">🎵 PLAVE 앨범 구매 관리<span id="cat-label"></span></div>

  <div class="nav-section">메뉴</div>
  <button class="nav-item active" onclick="nav('dash')" data-tab="dash">
    <i class="nav-icon">◈</i> 대시보드
  </button>
  <button class="nav-item" onclick="nav('purch')" data-tab="purch">
    <i class="nav-icon">🛍</i> 구매 기록
  </button>
  <button class="nav-item" onclick="nav('stores')" data-tab="stores">
    <i class="nav-icon">🏪</i> 판매처 정보
  </button>
  <button class="nav-item" onclick="nav('unpo')" data-tab="unpo">
    <i class="nav-icon">📸</i> 미공포
  </button>
  <button class="nav-item" onclick="nav('cal')" data-tab="cal">
    <i class="nav-icon">📅</i> 캘린더
  </button>
  <button class="nav-item" onclick="nav('notices')" data-tab="notices">
    <i class="nav-icon">📢</i> 공지사항
  </button>

  <div style="margin-top:auto"></div>
  <button class="nav-item" onclick="openSettings()">
    <i class="nav-icon">⚙</i> 설정
  </button>
</nav>

<!-- ── Main ── -->
<main class="main-content" id="main">

<!-- ─ 분류 선택 ─ -->
<div id="cat-bar" class="cat-selector" style="margin-bottom:12px"></div>

<!-- ════════════════════════════════════════
  DASHBOARD
════════════════════════════════════════ -->
<div class="page active" id="page-dash">
  <div class="page-header">
    <div>
      <div class="page-title" id="dash-title">대시보드</div>
      <div class="page-sub" id="dash-sub">구매 현황 요약</div>
    </div>
    <div class="flex gap-8">
      <button class="btn btn-ghost btn-sm" onclick="addPurchModal()">+ 구매 추가</button>
    </div>
  </div>

  <!-- 공지사항 -->
  <div id="dash-notices" style="margin-bottom:8px"></div>

  <!-- Stats -->
  <div class="stats-grid" id="dash-stats"></div>

  <!-- 앨범별 구매 장수 -->
  <div class="card" style="margin-bottom:12px">
    <div class="card-header">
      <div class="card-title">📦 앨범별 구매 현황</div>
    </div>
    <div id="dash-album-grid"></div>
  </div>

  <!-- 구매 현황 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📋 구매 현황</div>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="btn btn-ghost btn-xs" id="dash-sort-date" onclick="S.dashSort='date';render()">날짜</button>
        <button class="btn btn-ghost btn-xs" id="dash-sort-total" onclick="S.dashSort='total';render()">금액</button>
        <button class="btn btn-ghost btn-xs" id="dash-sort-name" onclick="S.dashSort='name';render()">가나다</button>
        <span style="width:1px;height:16px;background:var(--bd);margin:0 2px"></span>
        <button class="btn btn-ghost btn-xs" onclick="S.showProxy=!S.showProxy;render()">
          대리 <span id="proxy-toggle-txt">표시</span>
        </button>
      </div>
    </div>
    <div class="status-strip" id="dash-status-strip" style="margin-bottom:12px"></div>
    <div id="dash-purch-list"></div>
  </div>

  <!-- 미구매 처 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📋 미구매 판매처</div>
      <button class="btn btn-ghost btn-sm" onclick="S.hideExpired=!S.hideExpired;render()">
        <span id="hide-exp-txt">마감 숨김</span>
      </button>
    </div>
    <div id="dash-unpurchased"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
  PURCHASE
════════════════════════════════════════ -->
<div class="page" id="page-purch">
  <div class="page-header">
    <div>
      <div class="page-title">구매 기록</div>
      <div class="page-sub">내 구매 내역과 배송 현황</div>
    </div>
    <button class="btn btn-p" onclick="addPurchModal()">+ 구매 추가</button>
  </div>

  <div class="filter-bar">
    <input type="text" id="purch-search" placeholder="판매처, 메모 검색..." oninput="render()">
    <select id="purch-status-filter" onchange="render()">
      <option value="">전체 상태</option>
      <option value="unpurchased">미구매</option>
      <option value="planned">구매예정</option>
      <option value="waiting">구매대기</option>
      <option value="ordered">구매완료</option>
      <option value="preparing">발송준비</option>
      <option value="shipped">배송중</option>
      <option value="delivered">배송완료</option>
      <option value="cancelled">취소</option>
    </select>
    <select id="purch-cat-filter" onchange="render()">
      <option value="">전체 분류</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="S.purchSort=S.purchSort==='date'?'total':'date';render()">
      정렬: <span id="purch-sort-txt">날짜</span>
    </button>
  </div>

  <div class="section-tabs" id="purch-subtabs" style="margin-bottom:12px">
    <button class="section-tab active" data-pubtab="list" onclick="S.purchSubTab='list';render()">구매목록</button>
    <button class="section-tab" data-pubtab="proxy" onclick="S.purchSubTab='proxy';render()">대리구매</button>
  </div>

  <div id="purch-list-view">
    <div id="purch-total-bar" style="margin-bottom:12px"></div>
    <div id="purch-list"></div>
  </div>

  <div id="purch-proxy-view" style="display:none">
    <div id="purch-proxy-content"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
  STORES
════════════════════════════════════════ -->
<div class="page" id="page-stores">
  <div class="page-header">
    <div>
      <div class="page-title">판매처 정보</div>
      <div class="page-sub">판매처별 미공포 및 구매 정보</div>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="store-search" placeholder="판매처 이름 검색..." oninput="render()">
    <select id="store-country-filter" onchange="render()">
      <option value="">전체 국가</option>
      <option value="KR">국내</option>
      <option value="JP">일본</option>
      <option value="CN">중국</option>
      <option value="US">미국</option>
      <option value="TW">대만</option>
    </select>
    <select id="store-alb-filter" onchange="render()">
      <option value="">전체 앨범</option>
    </select>
    <button class="filter-btn" id="btn-show-ended" onclick="S.storeShowEnded=!S.storeShowEnded;render()">마감 포함</button>
    <button class="filter-btn" id="btn-music-only" onclick="S.storeMusicOnly=!S.storeMusicOnly;render()">🎵 음총</button>
    <button class="filter-btn" id="btn-unpo-only" onclick="S.storeUnpoOnly=!S.storeUnpoOnly;render()">미공포</button>
    <button class="filter-btn" id="btn-vc-only" onclick="S.storeVcOnly=!S.storeVcOnly;render()">📞 영통</button>
    <select id="store-country-filter2" onchange="render()" style="display:none"></select>
  </div>

  <!-- Album type tabs -->
  <div class="alb-selector" id="stores-alb-tabs"></div>

  <div id="stores-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px"></div>
</div>

<!-- ════════════════════════════════════════
  UNPO
════════════════════════════════════════ -->
<div class="page" id="page-unpo">
  <div class="page-header">
    <div>
      <div class="page-title">미공포 (Pre-Order Benefits)</div>
      <div class="page-sub">판매처별 미공개 포토카드</div>
    </div>
  </div>

  <div class="alb-selector" id="unpo-alb-tabs"></div>

  <div class="filter-bar" style="margin-top:-8px">
    <input type="text" id="unpo-search" placeholder="판매처 검색..." oninput="render()">
    <button class="filter-btn" id="btn-unpo-owned-only" onclick="S.unpoOwnedOnly=!S.unpoOwnedOnly;render()">WANT만</button>
  </div>

  <div id="unpo-content"></div>
</div>

<!-- ════════════════════════════════════════
  CALENDAR
════════════════════════════════════════ -->
<div class="page" id="page-cal">
  <div class="page-header">
    <div>
      <div class="page-title">캘린더</div>
      <div class="page-sub">발매일 기준 일정 정리</div>
    </div>
    <div class="flex gap-8" id="cal-header-checks">
      <label class="form-check"><input type="checkbox" id="cal-show-pur" checked onchange="render()"><span style="font-size:12px">구매기간</span></label>
      <label class="form-check"><input type="checkbox" id="cal-show-off" checked onchange="render()"><span style="font-size:12px">오프라인</span></label>
      <label class="form-check"><input type="checkbox" id="cal-show-del" checked onchange="render()"><span style="font-size:12px">배송예정</span></label>
      <label class="form-check"><input type="checkbox" id="cal-show-vc" checked onchange="render()"><span style="font-size:12px">영통</span></label>
    </div>
  </div>

  <!-- 캘린더 서브탭 -->
  <div class="section-tabs" style="margin-bottom:12px" id="cal-subtabs">
    <button class="section-tab active" onclick="S.calTab='calendar';render()" data-caltab="calendar">📅 캘린더</button>
    <button class="section-tab" onclick="S.calTab='events';render()" data-caltab="events">🏪 오프라인 이벤트</button>
  </div>

  <!-- 캘린더 뷰 -->
  <div id="cal-calendar-view">
    <div class="cal-nav">
      <button class="btn btn-ghost btn-sm" onclick="calPrev()">‹</button>
      <div class="cal-nav-title" id="cal-month-title"></div>
      <button class="btn btn-ghost btn-sm" onclick="calNext()">›</button>
      <button class="btn btn-ghost btn-sm" onclick="calToday()">오늘</button>
    </div>
    <div class="cal-grid" id="cal-header-row"></div>
    <div class="cal-grid" id="cal-body" style="margin-top:4px"></div>
    <div id="cal-day-detail"></div>
  </div>

  <!-- 오프라인 이벤트 뷰 -->
  <div id="cal-events-view" style="display:none">
    <div id="cal-events-list"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
  NOTICES
════════════════════════════════════════ -->
<div class="page" id="page-notices">
  <div class="page-header">
    <div>
      <div class="page-title">공지사항</div>
      <div class="page-sub">운영자 공지 및 안내</div>
    </div>
  </div>
  <div id="notices-list"></div>
</div>

</main>
</div>

<!-- ═══════════════════════════════════════════
  MODALS
═══════════════════════════════════════════ -->

<!-- Purchase Modal -->
<div class="modal-bg" id="modal-purch">
  <div class="modal modal-lg">
    <div class="modal-head">
      <h3 id="modal-purch-title">구매 추가</h3>
      <button class="modal-close" onclick="closeModal('modal-purch')">✕</button>
    </div>
    <div class="modal-body" id="modal-purch-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-purch')">취소</button>
      <button class="btn btn-p" onclick="savePurch()">저장</button>
    </div>
  </div>
</div>

<!-- Store Detail Modal -->
<div class="modal-bg" id="modal-store">
  <div class="modal modal-lg">
    <div class="modal-head">
      <h3 id="modal-store-title">판매처 상세</h3>
      <button class="modal-close" onclick="closeModal('modal-store')">✕</button>
    </div>
    <div class="modal-body" id="modal-store-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-store')">닫기</button>
      <button class="btn btn-p" onclick="addPurchFromStore()">이 판매처로 구매추가</button>
    </div>
  </div>
</div>

<!-- Unpo Detail Modal -->
<div class="modal-bg" id="modal-unpo">
  <div class="modal modal-xl">
    <div class="modal-head">
      <h3 id="modal-unpo-title">미공포 상세</h3>
      <button class="modal-close" onclick="closeModal('modal-unpo')">✕</button>
    </div>
    <div class="modal-body" id="modal-unpo-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-unpo')">닫기</button>
    </div>
  </div>
</div>

<!-- Detail Modal (status / album / store popup) -->
<div class="modal-bg" id="modal-detail">
  <div class="modal modal-lg">
    <div class="modal-head">
      <div>
        <h3 id="modal-detail-title" style="margin:0">상세</h3>
        <div id="modal-detail-subtitle" style="font-size:12px;color:var(--tx3);margin-top:2px;display:none"></div>
      </div>
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div id="detail-tabs" style="display:none;padding:0 16px;border-bottom:1px solid var(--bd);margin-bottom:0"></div>
    <div class="modal-body" id="modal-detail-body"></div>
    <div class="modal-foot" id="modal-detail-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-detail')">닫기</button>
    </div>
  </div>
</div>

<!-- FAB -->
<div class="fab" id="fab" style="display:none">
  <button class="fab-btn fab-btn-p" onclick="addPurchModal()" title="구매 추가">+</button>
  <button class="fab-btn fab-top" id="fab-top" onclick="document.getElementById('main').scrollTo({top:0,behavior:'smooth'})" title="맨 위로">↑</button>
</div>

<!-- Bottom nav (mobile) -->
<nav class="bottom-nav">
  <button class="bottom-nav-item active" onclick="nav('dash')" data-tab="dash">

    <span class="bottom-nav-label">대시보드</span>
  </button>
  <button class="bottom-nav-item" onclick="nav('purch')" data-tab="purch">
    <span class="bottom-nav-icon">🛍</span>
    <span class="bottom-nav-label">구매</span>
  </button>
  <button class="bottom-nav-item" onclick="nav('stores')" data-tab="stores">
    <span class="bottom-nav-icon">🏪</span>
    <span class="bottom-nav-label">판매처</span>

  <button class="bottom-nav-item" onclick="nav('unpo')" data-tab="unpo">

    <span class="bottom-nav-label">미공포</span>
  </button>
  <button class="bottom-nav-item" onclick="nav('cal')" data-tab="cal">

  <button class="bottom-nav-item" onclick="nav('notices')" data-tab="notices">

</nav>

<script src="js/db.js"></script>
<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const COUNTRIES = {
  KR: { lb: '한국', cur: 'KRW', ovs: false, flag: '🇰🇷' },
  JP: { lb: '일본', cur: 'JPY', ovs: true,  flag: '🇯🇵' },
  CN: { lb: '중국', cur: 'CNY', ovs: true,  flag: '🇨🇳' },
  US: { lb: '미국', cur: 'USD', ovs: true,  flag: '🇺🇸' },
  TW: { lb: '대만', cur: 'TWD', ovs: true,  flag: '🇹🇼' },
  HK: { lb: '홍콩', cur: 'HKD', ovs: true,  flag: '🇭🇰' },
};

const STATUS_MAP = {
  unpurchased: { lb: '미구매',   cls: 'st-unpurchased' },
  planned:     { lb: '구매예정', cls: 'st-planned' },
  waiting:     { lb: '구매대기', cls: 'st-waiting' },
  ordered:     { lb: '구매완료', cls: 'st-ordered' },
  preparing:   { lb: '발송준비', cls: 'st-preparing' },
  shipped:     { lb: '배송중',   cls: 'st-shipped' },
  delivered:   { lb: '배송완료', cls: 'st-delivered' },
  cancelled:   { lb: '취소',     cls: 'st-cancelled' },
};

const DISP_STATUSES = [
  { k: 'none',         lb: '미구매(무기록)', cls: 'st-planned',     keys: [] },
  { k: 'unpurchased',  lb: '미구매',         cls: 'st-unpurchased', keys: ['unpurchased'] },

function init() {
  DB = dbInit();
  // Set default category — most recently added (highest sortOrder then createdAt)
  const visibleCats = (DB.categories || []).filter(c => !c.hidden);
  if (visibleCats.length > 0) {
    const sortedCats = [...visibleCats].sort((a, b) =>
      (b.sortOrder || 0) - (a.sortOrder || 0) || (b.createdAt || 0) - (a.createdAt || 0)
    );
    S.catId = sortedCats[0].id;
  }
  applyTheme();
  buildCatBar();
  buildFilters();
  render();

  // Scroll listener for FAB top
  const main = document.getElementById('main');
  main.addEventListener('scroll', () => {
    const btn = document.getElementById('fab-top');
    if (btn) btn.classList.toggle('show', main.scrollTop > 300);
  }, { passive: true });

  // Auto-sync from admin via BroadcastChannel
  try {
    const bc = new BroadcastChannel('albumapp_sync');
    bc.onmessage = () => { reloadDB(); buildCatBar(); buildFilters(); render(); };
  } catch(e) {}

  // Open store popup if ?store= URL param present
  const _urlStore = new URLSearchParams(location.search).get('store');
  if (_urlStore) setTimeout(() => openStorePopup(_urlStore), 300);

  checkNoticePopup();
  loadServiceData();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadServiceData();
  });
}

async function loadServiceData() {
  try {
    const r = await fetch('./db/data.json?t=' + Date.now(), { cache: 'no-cache' });
    if (!r.ok) return;
    const data = await r.json();
    if (!data.categories?.length && !data.stores?.length && !data.albumTypes?.length) return;
    const savedPurchases = JSON.parse(JSON.stringify(DB.purchases || []));
    const localOwnedMap = Object.fromEntries((DB.unpoCards || []).map(c => [c.id, c.owned]));
    const savedAdminPw = DB.settings?.adminPw || '';
    const savedGithub = DB.settings?.github || {};
    dbImportJSON(JSON.stringify(data));
    reloadDB();
    // Merge: use service card structure/images, preserve local owned flags
    const mergedUnpoCards = (DB.unpoCards || []).map(c => ({
      ...c,
      owned: localOwnedMap[c.id] ?? c.owned,
    }));
    dbUpdate(s => ({ ...s, purchases: savedPurchases, unpoCards: mergedUnpoCards }));
    dbUpdateSettings({ adminPw: savedAdminPw, github: savedGithub });
    reloadDB(); buildCatBar(); buildFilters(); render();
  } catch(e) {}
}

function saveRateFromSettings(cur, val) {
  const v = parseFloat(val);
  if (!v || v <= 0) return;
  const rates = { ...(DB.settings?.rates || {}) };
  rates[cur] = { ...(rates[cur] || {}), rate: v, manual: true, updAt: new Date().toISOString() };
  dbUpdateSettings({ rates });
  reloadDB();
}

async function fetchRatesIndex() {
  toast('환율 가져오는 중...', 'ok');
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=KRW&to=JPY,CNY,USD,TWD,HKD');
    const data = await res.json();
    const r = data.rates;
    const rates = { ...(DB.settings?.rates || {}) };
    const map = { JPY: r.JPY, CNY: r.CNY, USD: r.USD, TWD: r.TWD, HKD: r.HKD };
    Object.entries(map).forEach(([k,v]) => {
      if (!v) return;
      const krwPer = Math.round((1 / v) * 10000) / 10000;
      rates[k] = { ...(rates[k]||{}), rate: krwPer, manual: false, updAt: new Date().toISOString() };
    });
    dbUpdateSettings({ rates, ratesAt: new Date().toISOString() });
    reloadDB();
    renderSettingsRates();
    const label = document.getElementById('rate-updated-label');
    if (label) label.textContent = '갱신: 방금';
    toast('환율 업데이트 완료');
  } catch(e) {
    toast('환율 가져오기 실패: ' + e.message, 'err');
  }
}

}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function rate(cur) {
  if (cur === 'KRW') return 1;
  return DB.settings?.rates?.[cur]?.rate || 1;
}
function toKRW(amt, cur) { return Math.round(amt * rate(cur)); }
function fKRW(n) {
  if (!n && n !== 0) return '—';
  return Math.round(n).toLocaleString('ko-KR') + '원';
}
function fDate(dt, time = false) {
  if (!dt) return '';
  try {
    const d = new Date(dt.length === 10 ? dt + 'T00:00:00' : dt);
    const y = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    if (!time) return `${y}. ${mo}. ${day}`;
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    return `${y}. ${mo}. ${day} ${hh}:${mm}`;
  } catch(e) { return dt; }
}
function fDateShort(dt) {
  if (!dt) return '';
  const d = new Date(dt.length === 10 ? dt + 'T00:00:00' : dt);
  return `${d.getFullYear()}. ${String(d.getMonth()+1).padStart(2,'0')}. ${d.getDate()}`;
}
function isExpired(store) {
  if (!store.purchaseEnd) return false;
  return new Date(store.purchaseEnd) < new Date();
}
function isOvs(store) { return COUNTRIES[store.country]?.ovs || false; }
function getStoreCur(store) { return COUNTRIES[store.country]?.cur || 'KRW'; }

function storePrice(store, albKey) {
  if (store.priceMode === 'custom') {
    if (store.customPrices && albKey in store.customPrices)
      return store.customPrices[albKey]; // null = 미판매
    return null;
  }
  // country mode: find album type's country price
  const alb = DB.albumTypes?.find(a => a.key === albKey && a.categoryId === store.categoryId);
  if (!alb) return null;
  const cur = getStoreCur(store);
  const country = store.country;
  return alb.countryPrices?.[country] ?? null;
}

function calcPurchTotal(p) {
  const store = DB.stores?.find(s => s.id === p.storeId);
  if (!store) return 0;
  const cur = getStoreCur(store);
  const discount = p.discount || 0;
  if (isOvs(store)) {
    let fAmt = p.foreignTotal || 0;
    if (!fAmt) {
      fAmt = (p.items || []).reduce((sum, it) => {
        const pr = it.unitPrice > 0 ? it.unitPrice : (storePrice(store, it.albKey) || 0);
        return sum + pr * (it.qty || 0);
      }, 0);
    }
    const base = p.directKrw > 0 ? p.directKrw : Math.round(fAmt * rate(cur));
    return Math.max(0, base + (p.intlShip || 0) + (p.fwdFee || 0) + (p.customs || 0) + (p.domShip || 0) - discount);
  } else {
    const items = (p.items || []).reduce((sum, it) => {
      const pr = it.unitPrice > 0 ? it.unitPrice : (storePrice(store, it.albKey) || 0);
      return sum + pr * (it.qty || 0);
    }, 0);
    return Math.max(0, items + (p.domShip || 0) - discount);
  }
}

function calcProxyTotal(p) {
  if (p.proxyKrw > 0) return p.proxyKrw;
  const totalQty = (p.items || []).reduce((s, it) => s + (it.qty || 0), 0);
  if (!totalQty) return 0;
  const proxyQty = (p.items || []).reduce((s, it) => s + (it.proxyQty || 0), 0);
  if (!proxyQty) return 0;
  return Math.round(calcPurchTotal(p) * proxyQty / totalQty);
}

function stBadge(st) {
  const s = STATUS_MAP[st] || STATUS_MAP['waiting'];
  return `<span class="badge ${s.cls}">${s.lb}</span>`;
}

function distName(distId) {
  return DB.distributors?.find(d => d.id === distId)?.name || '';
}

function catStores(catId) {
  return (DB.stores || [])
    .filter(s => s.categoryId === (catId || S.catId))
    .sort((a, b) => a.name.localeCompare(b.name, 'ko'));
}

function getCatAlbums(catId) {
  return (DB.albumTypes || []).filter(a => a.categoryId === (catId || S.catId))
    .sort((a, b) => a.sortOrder - b.sortOrder);
}

function getCat(catId) {
  return (DB.categories || []).find(c => c.id === (catId || S.catId));
}

function storeName(storeId) {
  const s = DB.stores?.find(x => x.id === storeId);
  return s ? s.name : '알 수 없는 판매처';
}

function fDeadline(store) {
  if (isExpired(store)) {
    if (!store.purchaseEnd) return '마감';
    const diff = Math.round((new Date() - new Date(store.purchaseEnd)) / 86400000);
    return diff >= 3 ? `${diff}일 경과` : '마감';
  }
  if (!store.purchaseEnd) return store.purchaseEndTxt || '미정';
  const diff = Math.ceil((new Date(store.purchaseEnd) - new Date()) / 86400000);
  if (diff === 0) return '오늘 마감';
  if (diff <= 3) return `D-${diff} ⚠`;
  return `D-${diff}`;
}

function shareStore(storeId) {
  const store = (DB.stores || []).find(s => s.id === storeId);
  const name = store ? store.name : '판매처';
  const url = location.origin + location.pathname + '?store=' + encodeURIComponent(storeId);
  if (navigator.share) {
    navigator.share({ title: name, url });
  } else {
    navigator.clipboard.writeText(url).then(() => toast('링크가 복사되었습니다')).catch(() => {
      prompt('링크를 복사하세요:', url);
    });
  }
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDash() {
  const cat = getCat();
  if (!cat) {
    document.getElementById('dash-stats').innerHTML = '<div class="empty">분류가 없습니다. 관리자에서 추가하세요.</div>';
    return;
  }

  document.getElementById('dash-title').textContent = cat.name + ' 대시보드';
  document.getElementById('dash-sub').textContent = cat.artist + ' · 발매일: ' + (cat.releaseDate ? fDate(cat.releaseDate) : '미정');

  const stores = catStores();
  const albums = getCatAlbums();
  const purches = (DB.purchases || []).filter(p => {
    const st = DB.stores?.find(s => s.id === p.storeId);
    return st?.categoryId === S.catId;
  });

  const totalSpend = purches.reduce((s, p) => s + calcPurchTotal(p), 0);
  const waitingSpend = purches
    .filter(p => ['planned','waiting'].includes(p.status || 'waiting'))
    .reduce((s, p) => s + calcPurchTotal(p), 0);
  const proxySpend = purches.reduce((s, p) => s + calcProxyTotal(p), 0);
  const totalQty = purches.reduce((s, p) => s + (p.items || []).reduce((ss, it) => ss + (it.qty || 0), 0), 0);
  const pendingCount = purches.filter(p => !['delivered','cancelled'].includes(p.status || 'waiting')).length;
  const deliveredCount = purches.filter(p => p.status === 'delivered').length;

  const releaseRef = cat.preReleaseDate || cat.digitalReleaseDate || cat.releaseDate;
  const daysToRelease = releaseRef
    ? Math.ceil((new Date(releaseRef) - new Date()) / 86400000)
    : null;

  // Stat cards: 총지출 / D-day / 총구매장수 / 미배송건수
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${fKRW(totalSpend)}</div>
      <div class="stat-label">총 지출</div>
      <div class="stat-sub" style="line-height:1.6">
        ${waitingSpend > 0 ? `대기 ${fKRW(waitingSpend)}<br>` : ''}${proxySpend > 0 ? `대리 ${fKRW(proxySpend)}` : '내 지출'}
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-num ${daysToRelease === null ? '' : daysToRelease <= 0 ? 'ok' : daysToRelease <= 7 ? 'warn' : ''}">${
        daysToRelease === null ? '?' : daysToRelease <= 0 ? '발매됨' : 'D-' + daysToRelease
      }</div>
      <div class="stat-label">발매까지</div>
      <div class="stat-sub">${releaseRef ? fDate(releaseRef) : '미정'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-num ok">${totalQty}</div>
      <div class="stat-label">총 구매 장수</div>
      <div class="stat-sub">${purches.length}건 구매</div>
    </div>
    <div class="stat-card">
      <div class="stat-num ${pendingCount > 0 ? 'warn' : 'ok'}">${pendingCount}</div>
      <div class="stat-label">미배송 건수</div>
      <div class="stat-sub">배송완료 ${deliveredCount}건</div>
    </div>
  `;

  // Album count grid
  const albGrid = document.getElementById('dash-album-grid');
  if (albGrid) {
    const albCounts = {}, albProxy = {};
    albums.forEach(a => { albCounts[a.key] = 0; albProxy[a.key] = 0; });
    purches.forEach(p => (p.items||[]).forEach(it => {
      albCounts[it.albKey] = (albCounts[it.albKey]||0) + (it.qty||0);
      albProxy[it.albKey] = (albProxy[it.albKey]||0) + (it.proxyQty||0);
    }));
    albGrid.innerHTML = `<div style="display:grid;grid-template-columns:repeat(${Math.min(albums.length, 5)},1fr);gap:6px;padding:4px 0">
      ${albums.map(a => {
        const total = albCounts[a.key]||0, proxy = albProxy[a.key]||0;
        return `<div class="alb-count-card${total?'':' empty'}"${total?` onclick="showAlbumDetail('${a.key}')" style="cursor:pointer"`:''}">
          <div class="alb-count-label">${a.name}</div>
          <div class="alb-count-num${total?' ok':''}">${total}</div>
          <div class="alb-count-unit">장</div>
          ${S.showProxy&&proxy>0?`<div class="alb-count-proxy"><span>대리 ${proxy}장</span></div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // Notices
  const noticesEl = document.getElementById('dash-notices');
  if (noticesEl) {
    const NOTICE_STYLE = { info: 'border-left:3px solid var(--info,#4ea8f7)', warn: 'border-left:3px solid var(--warn)', ok: 'border-left:3px solid var(--ok)' };
    const activeNotices = (DB.notices || [])
      .filter(n => n.visible)
      .sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.createdAt) - new Date(a.createdAt));
    noticesEl.innerHTML = activeNotices.map(n => `
      <div style="background:var(--sur2);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;${NOTICE_STYLE[n.type] || ''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:${n.body ? 4 : 0}px">
          ${n.pinned ? '<span>📌</span>' : ''}
          <span class="fw-600" style="font-size:14px">${n.title}</span>
        </div>
        ${n.body ? `<div style="font-size:13px;color:var(--tx2);white-space:pre-wrap">${n.body}</div>` : ''}
      </div>
    `).join('');
  }

  // Status filter strip (구매 현황)
  const purchasedIds = new Set(purches.map(p => p.storeId));
  const bySt = { waiting: 0, ordered: 0, shipping: 0, delivered: 0 };
  purches.forEach(p => {
    const st = p.status || 'waiting';
    if (['planned','waiting'].includes(st)) bySt.waiting++;
    else if (st === 'ordered') bySt.ordered++;
    else if (['preparing','shipped'].includes(st)) bySt.shipping++;
    else if (st === 'delivered') bySt.delivered++;
  });

  const activeFilter = S.dashStatusFilter;
  const filterDefs = [
    { k: null,        lb: '전체',   cls: 'badge-gray',   cnt: purches.length },
    { k: 'waiting',   lb: '구매대기', cls: 'st-waiting',  cnt: bySt.waiting },
    { k: 'ordered',   lb: '구매완료', cls: 'st-ordered',  cnt: bySt.ordered },
    { k: 'shipping',  lb: '배송중',  cls: 'st-shipped',   cnt: bySt.shipping },
    { k: 'delivered', lb: '배송완료', cls: 'st-delivered', cnt: bySt.delivered },
  ];
  const stripEl = document.getElementById('dash-status-strip');
  if (stripEl) {
    stripEl.innerHTML = filterDefs.map(f => {
      const isActive = activeFilter === f.k;
      return `<span class="badge ${f.cls}"
        style="cursor:pointer;padding:5px 12px;font-size:12px;${isActive ? 'box-shadow:0 0 0 2px var(--pk2)' : f.cnt === 0 ? 'opacity:.4' : ''}"
        onclick="S.dashStatusFilter=${f.k === null ? 'null' : `'${f.k}'`};render()"
        >${f.lb} <b>${f.cnt}</b></span>`;
    }).join('');
  }
  document.getElementById('proxy-toggle-txt').textContent = S.showProxy ? '숨김' : '표시';
  // Update sort button active styles
  ['date','total','name'].forEach(v => {
    const el = document.getElementById('dash-sort-' + v);
    if (el) el.style.background = S.dashSort === v ? 'var(--ac)' : '';
    if (el) el.style.color = S.dashSort === v ? '#fff' : '';
  });

  // Filtered purchase list
  let fp = purches;
  if (activeFilter) {
    const ds = DISP_STATUSES.find(d => d.k === activeFilter);
    if (ds) fp = purches.filter(p => ds.keys.includes(p.status || 'waiting'));
  }
  // Sort
  if (S.dashSort === 'total') fp = [...fp].sort((a,b) => calcPurchTotal(b) - calcPurchTotal(a));
  else if (S.dashSort === 'name') fp = [...fp].sort((a,b) => storeName(a.storeId).localeCompare(storeName(b.storeId),'ko'));
  else fp = [...fp].sort((a,b) => (b.orderDate||'').localeCompare(a.orderDate||''));

  const purchListEl = document.getElementById('dash-purch-list');
  if (purchListEl) {
    purchListEl.innerHTML = fp.length
      ? fp.map(p => {
          const store = DB.stores?.find(s => s.id === p.storeId);
          const total = calcPurchTotal(p);
          const proxy = calcProxyTotal(p);
          const items = (p.items || []).filter(it => it.qty > 0);
          const albCounts = items.map(it => {
            const alb = DB.albumTypes?.find(a => a.key === it.albKey);
            return `<span>${alb?.name || it.albKey} <b>${it.qty}</b>장${it.proxyQty > 0 && S.showProxy ? `<span style="color:var(--warn);font-size:10px"> (대리${it.proxyQty})</span>` : ''}</span>`;
          }).join('');
          return `<div class="dash-purch-item">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span class="fw-600">${store?.name || '?'}</span>
                ${store?.isMusicStreamTeam ? '<span class="music-tag">🎵</span>' : ''}
                ${store?.hanteoChart ? '<span style="font-size:10px;background:rgba(96,165,250,.15);color:var(--info);padding:1px 5px;border-radius:3px">한터</span>' : ''}
                ${stBadge(p.status || 'waiting')}
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <span class="fw-600 text-sm">${fKRW(total)}</span>
                <button class="btn btn-ghost btn-xs" onclick="viewPurchDetail('${p.id}')">상세</button>
                <button class="btn btn-ghost btn-xs" onclick="editPurch('${p.id}')">편집</button>
              </div>
            </div>
            <div style="font-size:12px;color:var(--tx2);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap">
              ${albCounts}
              ${p.orderDate ? `<span style="color:var(--tx3)">주문: ${fDate(p.orderDate)}</span>` : ''}
              ${proxy > 0 && S.showProxy ? `<span style="color:var(--warn)">대리 ${fKRW(proxy)}</span>` : ''}
            </div>
            ${p.trackingNumber ? `<div style="font-size:11px;color:var(--tx3);margin-top:3px">📦 ${p.carrier || ''} ${p.trackingNumber}</div>` : ''}
          </div>`;
        }).join('')
      : '<div class="empty" style="padding:20px">구매 기록 없음</div>';
  }

  // Unpurchased — list with 영통/음총/한터/deadline
  const purchasedStoreIds = new Set(purches.map(p => p.storeId));
  const unpurchased = stores
    .filter(s => !purchasedStoreIds.has(s.id))
    .filter(s => !S.hideExpired || !isExpired(s));
  document.getElementById('hide-exp-txt').textContent = S.hideExpired ? '마감 포함' : '마감 숨김';

  document.getElementById('dash-unpurchased').innerHTML = unpurchased.length
    ? `<div style="display:flex;flex-direction:column;gap:4px">
        ${unpurchased.map(s => {
          const deadline = fDeadline(s);
          const expired = isExpired(s);
          const unpoKeys = getStoreUnpoKeys(s);
          return `<div class="unpurchased-row" onclick="openStorePopup('${s.id}')">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
              <span class="fw-600" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</span>
              ${s.isMusicStreamTeam ? '<span class="music-tag" style="flex-shrink:0">🎵</span>' : ''}
              ${s.videocall ? '<span style="font-size:13px;flex-shrink:0" title="영통">📞</span>' : ''}
              ${s.hanteoChart ? '<span style="font-size:11px;background:rgba(96,165,250,.15);color:var(--info);padding:1px 5px;border-radius:3px;flex-shrink:0">한터</span>' : ''}
              ${unpoKeys.map(k=>{const alb=(DB.albumTypes||[]).find(a=>a.key===k);return `<span class="badge badge-pk" style="font-size:10px;flex-shrink:0">${alb?.shortName||alb?.name||k}</span>`;}).join('')}
            </div>
            <div class="text-sm fw-600" style="color:${expired ? 'var(--err)' : 'var(--tx2)'};flex-shrink:0">${deadline}</div>
          </div>`;
        }).join('')}
      </div>`
    : '<div class="empty">미구매 판매처 없음</div>';
}

  if (!storePurches.length) return '<div class="empty">구매 기록 없음</div>';
  return storePurches.map(p => {
    const total = calcPurchTotal(p);
    const items = (p.items || []).filter(it => it.qty > 0);
    const extras = [
      p.domShip ? `배송 ${fKRW(p.domShip)}` : '',
      p.intlShip ? `국제 ${fKRW(p.intlShip)}` : '',
      p.fwdFee ? `포워딩 ${fKRW(p.fwdFee)}` : '',
      p.customs ? `관세 ${fKRW(p.customs)}` : '',

    return `<div style="padding:10px 0;border-bottom:1px solid var(--bd)">

          ${stBadge(p.status || 'waiting')}
          ${p.orderDate ? `<span class="text-xs text-muted">${fDate(p.orderDate)}</span>` : ''}

        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="fw-600 text-sm">${fKRW(total)}</span>
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();editPurch('${p.id}')">편집</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--tx2);display:flex;gap:8px;flex-wrap:wrap">

function toggleSpend(sid) {

  const detail = document.getElementById('scd-' + sid);
  if (!card || !detail) return;
  const open = detail.classList.toggle('open');

function showStatusDetail(key) {
  const cat = getCat();
  const stores = catStores();
  const purches = (DB.purchases || []).filter(p => {
    const st = DB.stores?.find(s => s.id === p.storeId);
    return st?.categoryId === S.catId;
  });

  const ds = DISP_STATUSES.find(d => d.k === key);
  document.getElementById('modal-detail-title').textContent = ds ? ds.lb + ' 상세' : '상세';

  let html = '';
  if (key === 'none') {
    const purchasedIds = new Set(purches.map(p => p.storeId));
    const unpurchased = stores.filter(s => !purchasedIds.has(s.id));
    html = unpurchased.length
      ? `<div style="margin-bottom:10px;font-size:13px;color:var(--tx2)">총 ${unpurchased.length}개 판매처 미구매</div>` +
        unpurchased.map(s => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)">
            <div>
              <span class="fw-600">${s.name}</span>
              ${s.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : ''}
              <div class="text-xs text-muted">${fDate(s.purchaseStart, true)} ~ ${s.purchaseEnd ? fDate(s.purchaseEnd, true) : (s.purchaseEndTxt || '미정')}</div>
            </div>
            <button class="btn btn-p btn-xs" onclick="closeModal('modal-detail');addPurchModal('${s.id}')">+ 구매 추가</button>
          </div>`).join('')
      : '<div class="empty">모든 판매처에서 구매했습니다</div>';
  } else {
    const keys = ds?.keys || [];
    let matched = purches.filter(p => keys.includes(p.status || 'waiting'));
    if (!matched.length) matched = purches.filter(p => {
      const st = p.status || 'waiting';
      if (key === 'shipping') return ['preparing','shipped'].includes(st);
      return st === key;
    });
    html = matched.length
      ? matched.map(p => {
          const total = calcPurchTotal(p);
          const items = (p.items || []).map(it => {
            const alb = DB.albumTypes?.find(a => a.key === it.albKey);
            return `${alb?.name || it.albKey} ${it.qty}장`;
          }).join(', ');
          return `<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);gap:8px">
            <div style="flex:1">
              <div class="fw-600">${storeName(p.storeId)}</div>
              <div class="text-sm text-muted">${items}</div>
              ${p.orderDate ? `<div class="text-xs text-muted">${fDate(p.orderDate)}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div class="fw-600">${fKRW(total)}</div>
              ${stBadge(p.status || 'waiting')}
              <div style="margin-top:4px"><button class="btn btn-ghost btn-xs" onclick="closeModal('modal-detail');editPurch('${p.id}')">편집</button></div>
            </div>
          </div>`;
        }).join('')
      : '<div class="empty">해당 상태의 구매 기록 없음</div>';
  }
  document.getElementById('modal-detail-body').innerHTML = html;
  document.getElementById('modal-detail-foot').innerHTML = '<button class="btn btn-ghost" onclick="closeModal(\'modal-detail\')">닫기</button>';
  openModal('modal-detail');
}

// ═══════════════════════════════════════════
// STORE DETAIL (unified tabbed modal)
// ═══════════════════════════════════════════
function openStorePopup(storeId, tab, unpoAlbKey) {
  S.detailStoreId = storeId;
  if (tab) S.detailTab = tab;
  if (unpoAlbKey) S.detailUnpoAlbKey = unpoAlbKey;
  _renderStoreDetailModal();
}

function viewPurchDetail(id) {
  const p = (DB.purchases || []).find(x => x.id === id);
  if (!p) return;
  S.detailPurchId = id;
  openStorePopup(p.storeId, 'purchase');
}

function openUnpoViewer(storeId, albKey) {
  openStorePopup(storeId, 'unpo', albKey);
}

function _renderStoreDetailModal() {
  const storeId = S.detailStoreId;
  const store = DB.stores?.find(s => s.id === storeId);
  if (!store) return;

  const country = COUNTRIES[store.country];
  const ovs = isOvs(store);
  const cur = getStoreCur(store);
  const albums = getCatAlbums(store.categoryId);
  const unpoKeys = getStoreUnpoKeys(store);
  const myPurch = (DB.purchases || []).find(p => p.storeId === storeId);

  // Ensure valid tab
  const hasPurch = !!myPurch;
  const hasUnpo = unpoKeys.length > 0;
  if (S.detailTab === 'purchase' && !hasPurch) S.detailTab = 'info';
  if (S.detailTab === 'unpo' && !hasUnpo) S.detailTab = 'info';
  if (!S.detailUnpoAlbKey && unpoKeys.length) S.detailUnpoAlbKey = unpoKeys[0];

  // Tabs
  const tabs = [
    { id: 'info', label: '기본정보' },
    hasPurch ? { id: 'purchase', label: '구매기록' } : null,
    hasUnpo ? { id: 'unpo', label: '미공포' } : null,
  ].filter(Boolean);

  const tabsEl = document.getElementById('detail-tabs');
  if (tabs.length > 1) {
    tabsEl.style.display = '';
    tabsEl.innerHTML = tabs.map(t => `<button
      style="padding:10px 16px;font-size:13px;border:none;background:none;cursor:pointer;border-bottom:2px solid ${S.detailTab===t.id?'var(--pk)':'transparent'};color:${S.detailTab===t.id?'var(--pk)':'var(--tx2)'};font-weight:${S.detailTab===t.id?'700':'400'}"
      onclick="S.detailTab='${t.id}';_renderStoreDetailModal()">${t.label}</button>`).join('');
  } else {
    tabsEl.style.display = 'none';
    tabsEl.innerHTML = '';
  }

  const _titleEl = document.getElementById('modal-detail-title');
  _titleEl.innerHTML = `${store.name}${store.round ? ` <span style="font-size:12px;background:rgba(96,165,250,.15);color:var(--info);padding:1px 5px;border-radius:3px;font-weight:600;vertical-align:middle">${store.round}차</span>` : ''}${myPurch ? ' <span style="color:var(--ok);font-size:14px">✓</span>' : ''}`;
  const _subtitleParts = [country ? `${country.flag} ${country.lb}` : '', distName(store.distId)].filter(Boolean);
  const _subtitleEl = document.getElementById('modal-detail-subtitle');
  if (_subtitleEl) { const t = _subtitleParts.join(' · '); _subtitleEl.textContent = t; _subtitleEl.style.display = t ? '' : 'none'; }

  if (S.detailTab === 'info') {
    _renderDetailInfoTab(store, storeId, ovs, cur, albums, unpoKeys, myPurch, country);
  } else if (S.detailTab === 'purchase' && myPurch) {
    _renderDetailPurchTab(store, storeId, myPurch);
  } else if (S.detailTab === 'unpo' && hasUnpo) {
    _renderDetailUnpoTab(store, storeId, ovs, cur, albums, unpoKeys);
  }

  openModal('modal-detail');
}

function _renderDetailInfoTab(store, storeId, ovs, cur, albums, unpoKeys, myPurch, country) {
  function groupOfflineHours(hoursMap) {
    if (!hoursMap) return '';
    const D = ['월','화','수','목','금','토','일'];
    const groups = [];
    let i = 0;
    while (i < 7) {
      const h = hoursMap[i];
      if (h === null) {
        let j = i + 1;
        while (j < 7 && hoursMap[j] === null) j++;
        groups.push(`${D[i]}${j-i>1?'-'+D[j-1]:''} 휴무`);
        i = j;
      } else if (h) {
        let j = i + 1;
        while (j < 7 && hoursMap[j] === h) j++;
        groups.push(`${D[i]}${j-i>1?'-'+D[j-1]:''} ${h}`);
        i = j;
      } else {
        i++;
      }
    }
    return groups.join(' · ');
  }
  const DAYS_KR = ['월','화','수','목','금','토','일'];

  const topBadges = [
    store.videocall ? '<span class="badge badge-pk">📞 영상통화 이벤트</span>' : '',
    store.hanteoChart ? '<span style="font-size:11px;background:rgba(96,165,250,.15);color:var(--info);padding:2px 6px;border-radius:3px">한터</span>' : '',
    store.billboardChart ? '<span style="font-size:11px;background:rgba(34,197,94,.15);color:var(--ok);padding:2px 6px;border-radius:3px">빌보드</span>' : '',
    store.chartEtc ? `<span class="badge badge-gray">${store.chartEtc}</span>` : '',
    store.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : '',
    store.offlineLuckyDraw ? '<span style="font-size:11px;background:rgba(192,132,252,.15);color:var(--pk);padding:2px 6px;border-radius:3px;font-weight:600">럭드</span>' : '',
  ].filter(Boolean).join('');

  const deadline = fDeadline(store);
  const storeExpired = isExpired(store);
  const storeUrgent = !storeExpired && store.purchaseEnd && Math.ceil((new Date(store.purchaseEnd)-new Date())/86400000) <= 3;
  const deadlineInline = deadline
    ? storeUrgent
      ? ` <span style="font-weight:700;background:var(--err);color:#fff;padding:1px 5px;border-radius:3px;font-size:11px">${deadline}</span>`
      : storeExpired
        ? ` <span style="color:var(--tx3);font-size:11px">${deadline}</span>`
        : ` <span style="color:var(--ok);font-size:11px;font-weight:600">${deadline}</span>`
    : '';
  const vcHtml = store.videocall && (store.vcAnnounceDate || store.vcStart) ? `
    <div style="font-size:12px;margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)">
      <span class="badge badge-pk" style="font-size:10px;margin-right:4px">📞 영통</span>
      ${store.vcAnnounceDate ? `<span class="text-muted">발표</span> <span class="fw-600">${fDate(store.vcAnnounceDate)}</span>` : ''}
      ${store.vcStart ? `${store.vcAnnounceDate ? ' · ' : ''}<span class="text-muted">진행</span> <span class="fw-600">${fDate(store.vcStart)}</span>` : ''}
    </div>` : '';
  const periodHtml = `<div style="background:var(--sur2);border-radius:var(--r-sm);padding:10px;margin-bottom:10px">
    ${store.purchaseStart ? `<div style="font-size:12px;margin-bottom:4px"><span class="text-muted">구매 시작</span> <span class="fw-600">${fDate(store.purchaseStart, true)}</span></div>` : ''}
    <div style="font-size:12px"><span class="text-muted">구매 마감</span> <span class="fw-600">${store.purchaseEnd ? fDate(store.purchaseEnd, true) : (store.purchaseEndTxt || '미정')}</span>${deadlineInline}</div>
    ${vcHtml}
  </div>`;

  const offlineEvts = store.offlineEvents?.length ? store.offlineEvents
    : store.offlineStart ? [{ start: store.offlineStart, end: store.offlineEnd, addressName: store.offlineAddressName||'', addressDetail: store.offlineAddressDetail||store.offlineAddress||'', note: store.offlineNote||'', url: '', luckyDraw: store.offlineLuckyDraw||false, hoursMap: store.offlineHoursMap||{} }]
    : [];
  const offlineHtml = offlineEvts.length ? `
    <div class="section-divider">🏪 오프라인 정보</div>
    ${offlineEvts.map(ev => {
      const hrs = groupOfflineHours(ev.hoursMap);
      const addrMapUrl = ev.mapUrl || (ev.addressDetail ? `https://map.naver.com/v5/search/${encodeURIComponent(ev.addressDetail)}` : null);
      const addrText = ev.addressName ? `${ev.addressName}${ev.addressDetail ? ' · ' + ev.addressDetail : ''}` : ev.addressDetail || '';
      return `<div style="background:var(--sur2);border-radius:var(--r-sm);padding:10px;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600">${ev.start?fDate(ev.start):''}${ev.end&&ev.end!==ev.start?' ~ '+fDate(ev.end):''}${ev.luckyDraw?' <span style="font-size:11px;background:rgba(192,132,252,.15);color:var(--pk);padding:1px 5px;border-radius:3px;font-weight:600">럭드</span>':''}</div>
        ${addrText ? `<div style="font-size:12px;color:var(--tx2);margin-top:3px">📍 ${addrText}${addrMapUrl ? ` <a href="${addrMapUrl}" target="_blank" class="btn btn-ghost btn-xs" style="padding:1px 5px;font-size:10px">지도</a>` : ''}</div>` : ''}
        ${hrs?`<div style="font-size:11px;color:var(--tx3);margin-top:3px">${hrs}</div>`:''}
        ${ev.note?`<div style="font-size:12px;color:var(--tx2);margin-top:4px;white-space:pre-wrap">${ev.note}</div>`:''}
        ${ev.url?`<a href="${ev.url}" target="_blank" class="btn btn-ghost btn-xs" style="margin-top:6px;display:inline-flex">🔗 이벤트 공지</a>`:''}
      </div>`;
    }).join('')}` : '';

  const priceRows = albums.map(a => {
    const pr = storePrice(store, a.key);
    if (pr === null) return '';
    const prKrw = ovs ? toKRW(pr, cur) : pr;
    const isUnpoPr = unpoKeys.includes(a.key);
    return `<div class="price-row" style="${isUnpoPr ? 'background:rgba(168,85,247,.07);border-radius:4px;padding-left:6px;margin-bottom:2px' : ''}">
      <span>${a.name}${isUnpoPr ? ' <span class="badge badge-pk" style="font-size:9px;vertical-align:middle">미공포</span>' : ''}</span>
      <span class="fw-600">${ovs ? `${cur} ${Number(pr).toLocaleString()} <span style="color:var(--tx3);font-size:11px">(${fKRW(prKrw)})</span>` : fKRW(pr)}</span>
    </div>`;
  }).filter(Boolean).join('');

  document.getElementById('modal-detail-body').innerHTML = `
    ${topBadges ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${topBadges}</div>` : ''}
    ${periodHtml}
    ${offlineHtml}
    <div class="section-divider">앨범 단가</div>
    ${priceRows || '<div class="text-muted text-sm">가격 정보 없음</div>'}
  `;
  document.getElementById('modal-detail-foot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modal-detail')">닫기</button>
    <button class="btn btn-ghost" onclick="shareStore('${storeId}')">🔗 공유</button>
    ${store.url ? `<a href="${store.url}" target="_blank" class="btn btn-ghost">구매 링크 ↗</a>` : ''}
    <button class="btn btn-p" onclick="closeModal('modal-detail');addPurchModal('${storeId}')">+ 구매 추가</button>
  `;
}

function _renderDetailPurchTab(store, storeId, myPurch) {
  const p = S.detailPurchId ? (DB.purchases || []).find(x => x.id === S.detailPurchId) || myPurch : myPurch;
  if (!p) return;

  const ovs = isOvs(store);
  const cur = getStoreCur(store);
  const cat = DB.categories?.find(c => c.id === store.categoryId);
  const total = calcPurchTotal(p);
  const proxyTotal = calcProxyTotal(p);
  const myTotal = total - proxyTotal;

  const itemsHtml = (p.items || []).filter(it => it.qty > 0).map(it => {
    const alb = DB.albumTypes?.find(a => a.key === it.albKey);
    const pr = it.unitPrice > 0 ? it.unitPrice : (store ? storePrice(store, it.albKey) : 0);
    const sub = pr ? (ovs ? toKRW(pr, cur) * it.qty : pr * it.qty) : 0;
    return `<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--bd)">
      <span>${alb?.name || it.albKey} <span style="color:var(--tx3)">× ${it.qty}장</span></span>
      <span class="fw-600">${sub ? fKRW(sub) : '—'}</span>
    </div>`;
  }).join('');

  const extraCosts = [
    p.domShip && `국내배송비: ${fKRW(p.domShip)}`,
    p.intlShip && `국제배송비: ${fKRW(p.intlShip)}`,
    p.fwdFee && `포워딩: ${fKRW(p.fwdFee)}`,
    p.customs && `관세: ${fKRW(p.customs)}`,
    p.discount && `할인: -${fKRW(p.discount)}`,
  ].filter(Boolean);

  const trackingHtml = p.trackingNumber ? (() => {
    const url = carrierTrackUrl(p.carrier, p.trackingNumber);
    return `<div style="font-size:12px;color:var(--tx2);margin-top:8px">
      📦 ${p.carrier || '택배'}: ${url ? `<a href="${url}" target="_blank" style="color:var(--pk)"><code>${p.trackingNumber}</code> 조회↗</a>` : `<code>${p.trackingNumber}</code>`}
      ${p.shippedAt ? `<br>발송일: ${fDate(p.shippedAt)}` : ''}
      ${p.deliveredAt ? `<br>수령일: ${fDate(p.deliveredAt)}` : ''}
      ${p.estDelivery ? `<br>배송예정: ${fDate(p.estDelivery)}` : ''}

  })() : '';

  document.getElementById('modal-detail-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      ${stBadge(p.status || 'unpurchased')}
      ${cat ? `<span style="font-size:12px;color:var(--tx3)">${cat.name}</span>` : ''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--tx2);margin-bottom:12px">
      ${p.orderDate ? `<div><span style="color:var(--tx3)">주문일</span><br><span style="color:var(--tx1)">${fDate(p.orderDate)}</span></div>` : ''}
      ${p.orderNumber ? `<div><span style="color:var(--tx3)">주문번호</span><br><code style="color:var(--tx1)">#${p.orderNumber}</code></div>` : ''}
    </div>
    <div class="section-divider" style="margin-bottom:8px">구매 항목</div>
    ${itemsHtml || '<div class="text-muted text-sm">항목 없음</div>'}
    ${extraCosts.length ? `<div style="margin-top:8px;font-size:12px;color:var(--tx2)">${extraCosts.map(c=>`<div>${c}</div>`).join('')}</div>` : ''}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;font-size:14px">
      <span class="fw-600">합계</span>
      <span class="fw-600" style="color:var(--pk)">${fKRW(total)}</span>
    </div>
    ${proxyTotal ? `<div style="font-size:11px;color:var(--tx3);text-align:right">내 지출: ${fKRW(myTotal)}</div>` : ''}
    ${trackingHtml}

    ${(() => {
      const proxyRows = [];
      (p.items || []).forEach(it => {
        if (!it.proxyDetails?.length) return;
        const albName = DB.albumTypes?.find(a => a.key === it.albKey)?.name || it.albKey;
        it.proxyDetails.forEach((e, ei) => {

            <th style="text-align:center;padding:4px 6px;border-bottom:1px solid var(--bd)">수</th>
            <th style="text-align:center;padding:4px 6px;border-bottom:1px solid var(--bd)">입금</th>

          </tr></thead>
          <tbody>${proxyRows.map(e => `
            <tr>
              <td style="padding:5px 6px;border-bottom:1px solid var(--bd);font-size:11px;color:var(--tx3)">${e.type==='give'?'해주는것':'받는것'}</td>
              <td style="padding:5px 6px;border-bottom:1px solid var(--bd)">${e.name||'—'}</td>
              <td style="padding:5px 6px;border-bottom:1px solid var(--bd)">${e.albName}</td>
              <td style="padding:5px 6px;text-align:center;border-bottom:1px solid var(--bd)">${e.qty}장</td>
              <td style="padding:5px 6px;text-align:center;border-bottom:1px solid var(--bd)">

              </td>
              <td style="padding:5px 6px;text-align:center;border-bottom:1px solid var(--bd)">
                <button class="btn btn-xs ${e.delivered?'btn-ok':'btn-ghost'}" onclick="toggleProxyDelivered('${p.id}','${e.albKey}',${e.entryIdx});reloadDB();_renderStoreDetailModal()">${e.delivered?'✓배송':'미배송'}</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    })()}
  `;
  document.getElementById('modal-detail-foot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modal-detail')">닫기</button>
    <button class="btn btn-p" onclick="closeModal('modal-detail');editPurch('${p.id}')">편집</button>
  `;
}

function _renderDetailUnpoTab(store, storeId, ovs, cur, albums, unpoKeys) {
  // Album sub-tabs if multiple unpo albums
  const albKey = S.detailUnpoAlbKey || unpoKeys[0];
  const albSubTabs = unpoKeys.length > 1
    ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
        ${unpoKeys.map(k => {
          const a = DB.albumTypes?.find(x => x.key === k);
          return `<button class="alb-chip${k === albKey ? ' active' : ''}" onclick="S.detailUnpoAlbKey='${k}';_renderStoreDetailModal()">${a?.shortName || a?.name || k}</button>`;
        }).join('')}
      </div>`
    : '';

  const alb = DB.albumTypes?.find(a => a.key === albKey);
  const pr = alb ? storePrice(store, albKey) : null;
  const prKrw = (pr !== null && ovs) ? toKRW(pr, cur) : pr;
  const priceInfo = (alb && pr !== null) ? `<div style="background:rgba(168,85,247,.08);border-left:3px solid var(--pk);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span class="badge badge-pk" style="font-size:10px;flex-shrink:0">미공포 포함</span>
    <span class="fw-600">${alb.name}</span>
    <span style="color:var(--tx3)">${ovs ? `${cur} ${Number(pr).toLocaleString()} (${fKRW(prKrw)})` : fKRW(pr)}</span>
  </div>` : '';

  const uc = (DB.unpoCards || []).find(uc => uc.storeId === storeId && uc.albumTypeId === albKey);
  if (!uc?.sets?.length) {
    document.getElementById('modal-detail-body').innerHTML = `${albSubTabs}<div class="empty">미공포 사진이 없습니다</div>`;
    document.getElementById('modal-detail-foot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal('modal-detail')">닫기</button>`;
    return;
  }

  const setsHtml = uc.sets.map((set, si) => {
    const cards = set.cards || [];
    const colCount = Math.max(cards.length, 1);
    return `<div style="margin-bottom:16px">
      <div class="text-sm fw-600" style="margin-bottom:6px;display:flex;align-items:center;gap:6px">
        <span>세트 ${si+1}${set.memo ? ': ' + set.memo : ''}</span>
        ${set.luckyDraw ? '<span style="font-size:10px;background:rgba(192,132,252,.15);color:var(--pk);padding:1px 5px;border-radius:3px;font-weight:600">럭드</span>' : ''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(${colCount},1fr);gap:5px">
        ${cards.map((c, ci) => `
          <div class="unpo-card-wrap">
            <div class="unpo-card${c.owned ? ' owned' : ''}"
                 onclick="toggleUnpoOwned('${storeId}','${albKey}',${si},${ci});reloadDB();S.detailUnpoAlbKey='${albKey}';_renderStoreDetailModal()">
              ${c.img ? `<img src="${c.img}" loading="lazy">` : '<div class="no-img">📷<br>미등록</div>'}
            </div>
            ${c.note ? `<div style="font-size:9px;color:var(--tx3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.note}</div>` : ''}
            ${c.owned ? '<div class="unpo-owned-badge">WANT</div>' : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal-detail-body').innerHTML = `${albSubTabs}${priceInfo}${setsHtml}`;
  document.getElementById('modal-detail-foot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal('modal-detail')">닫기</button>`;
}

function renderPurch() {
  // Sub-tab state
  const subtabs = document.querySelectorAll('#purch-subtabs .section-tab');
  subtabs.forEach(btn => btn.classList.toggle('active', btn.dataset.pubtab === S.purchSubTab));
  document.getElementById('purch-list-view').style.display = S.purchSubTab === 'list' ? '' : 'none';
  document.getElementById('purch-proxy-view').style.display = S.purchSubTab === 'proxy' ? '' : 'none';

  if (S.purchSubTab === 'proxy') { renderProxyTab(); return; }

  const search = document.getElementById('purch-search')?.value.toLowerCase() || '';
  const statusF = document.getElementById('purch-status-filter')?.value || '';
  const catF = document.getElementById('purch-cat-filter')?.value || '';

  let purches = DB.purchases || [];

  if (catF) {
    purches = purches.filter(p => {
      const st = DB.stores?.find(s => s.id === p.storeId);
      return st?.categoryId === catF;
    });
  } else if (S.catId) {
    purches = purches.filter(p => {
      const st = DB.stores?.find(s => s.id === p.storeId);
      return st?.categoryId === S.catId;
    });
  }

  if (statusF) purches = purches.filter(p => p.status === statusF);
  if (search) purches = purches.filter(p =>
    storeName(p.storeId).toLowerCase().includes(search) ||
    (p.memo || '').toLowerCase().includes(search) ||
    (p.orderNumber || '').toLowerCase().includes(search)
  );

  purches = [...purches].sort((a, b) => {
    if (S.purchSort === 'total') return calcPurchTotal(b) - calcPurchTotal(a);
    return new Date(b.orderDate || b.createdAt || 0) - new Date(a.orderDate || a.createdAt || 0);
  });

  document.getElementById('purch-sort-txt').textContent = S.purchSort === 'date' ? '날짜' : '금액';

  const total = purches.reduce((s, p) => s + calcPurchTotal(p), 0);
  const proxyTotal = purches.reduce((s, p) => s + calcProxyTotal(p), 0);
  const myTotal = total - proxyTotal;
  document.getElementById('purch-total-bar').innerHTML = purches.length
    ? `<div style="padding:8px 12px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r-sm)">
        <div class="flex gap-12">
          <span class="text-muted text-sm">${purches.length}건</span>
          <span class="text-sm fw-600">총 ${fKRW(total)}</span>
          <span class="text-sm text-muted">내 지출 ${fKRW(myTotal)}</span>
        </div>
        ${proxyTotal > 0 ? `<div style="font-size:11px;color:var(--warn);margin-top:3px">대리구매 포함 ${fKRW(proxyTotal)}</div>` : ''}
      </div>` : '';

  document.getElementById('purch-list').innerHTML = purches.length
    ? purches.map(p => renderPurchCard(p)).join('')
    : '<div class="empty">구매 기록이 없습니다.<br><br><button class="btn btn-p" onclick="addPurchModal()">+ 구매 추가</button></div>';
}

function renderProxyTab() {
  const purches = (DB.purchases || []).filter(p => {
    if (!S.catId) return true;
    const st = DB.stores?.find(s => s.id === p.storeId);
    return st?.categoryId === S.catId;
  });

  // Split entries by type: receive vs give
  const receivedByPerson = {}; // name -> entries where type='receive' or no type
  const givenByPerson = {};    // name -> entries where type='give'

  purches.forEach(p => {
    (p.items || []).forEach(it => {
      if (!it.proxyDetails?.length) return;
      const alb = DB.albumTypes?.find(a => a.key === it.albKey);
      it.proxyDetails.forEach((e, ei) => {
        if (!e.name && !e.qty) return;
        const name = e.name || '(이름 없음)';
        const target = (e.type === 'give') ? givenByPerson : receivedByPerson;
        if (!target[name]) target[name] = [];
        target[name].push({
          purchId: p.id,
          storeId: p.storeId,
          albKey: it.albKey,
          albName: alb?.name || it.albKey,
          qty: e.qty || 0,
          paid: !!e.paid,
          delivered: !!e.delivered,
          entryIdx: ei,
          storeName: storeName(p.storeId),
          type: e.type || 'receive',
        });
      });
    });
  });

  const receiveNames = Object.keys(receivedByPerson).sort((a, b) => a.localeCompare(b, 'ko'));
  const giveNames = Object.keys(givenByPerson).sort((a, b) => a.localeCompare(b, 'ko'));

  if (!receiveNames.length && !giveNames.length) {
    document.getElementById('purch-proxy-content').innerHTML =
      '<div class="empty">대리구매 기록이 없습니다.<br><small style="color:var(--tx3)">구매 추가 시 앨범 행에서 + 대리 버튼으로 입력하세요.</small></div>';
    return;
  }

  function buildPersonCard(name, entries) {
    const totalQty = entries.reduce((s, e) => s + e.qty, 0);
    const allPaid = entries.every(e => e.paid);
    const allDelivered = entries.every(e => e.delivered);
    const unpaidCount = entries.filter(e => !e.paid).length;
    const undeliveredCount = entries.filter(e => e.paid && !e.delivered).length;

    const rows = entries.map(e => `
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)">
        <div style="flex:1;min-width:0">
          <span class="fw-600 text-sm">${e.albName}</span>
          <span class="text-muted text-sm"> · <span style="cursor:pointer;color:var(--pk);text-decoration:underline" onclick="navToPurchase('${e.purchId}')">${e.storeName}</span> · ${e.qty}장</span>
        </div>
        <button class="btn btn-xs ${e.paid ? 'btn-ok' : 'btn-ghost'}" onclick="toggleProxyPaid('${e.purchId}','${e.albKey}',${e.entryIdx})">
          ${e.paid ? '✓ 입금' : '미입금'}
        </button>
        <button class="btn btn-xs ${e.delivered ? 'btn-ok' : 'btn-ghost'}" onclick="toggleProxyDelivered('${e.purchId}','${e.albKey}',${e.entryIdx})">
          ${e.delivered ? '✓ 배송완료' : '미배송'}
        </button>
      </div>`).join('');

    return `<div class="card" style="margin-bottom:10px">
      <div class="card-header">
        <div>
          <span class="fw-600">${name}</span>
          <span class="text-muted text-sm" style="margin-left:8px">총 ${totalQty}장</span>
        </div>
        <div style="display:flex;gap:4px">
          ${unpaidCount ? `<span class="badge badge-warn">${unpaidCount}건 미입금</span>` : '<span class="badge badge-ok">입금완료</span>'}
          ${undeliveredCount ? `<span class="badge" style="background:rgba(99,102,241,.15);color:var(--ac)">${undeliveredCount}건 배송대기</span>` : (allPaid && allDelivered ? '<span class="badge badge-ok">배송완료</span>' : '')}
        </div>
      </div>
      <div style="padding:0 4px">${rows}</div>
    </div>`;
  }

  let html = '';
  if (receiveNames.length) {
    html += `<div class="section-divider">내가 받는 대리구매 (${receiveNames.length}명)</div>`;
    const unpaidPersons = receiveNames.filter(n => receivedByPerson[n].some(e => !e.paid)).length;
    html += `<div style="padding:8px 12px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:12px;display:flex;gap:16px">
      <span class="text-muted text-sm">${receiveNames.length}명</span>
      ${unpaidPersons ? `<span class="text-sm" style="color:var(--warn)">미입금 ${unpaidPersons}명</span>` : '<span class="text-sm" style="color:var(--ok)">전원 입금완료</span>'}
    </div>`;
    html += receiveNames.map(name => buildPersonCard(name, receivedByPerson[name])).join('');
  }
  if (giveNames.length) {
    html += `<div class="section-divider">내가 해주는 대리구매 (${giveNames.length}명)</div>`;
    html += giveNames.map(name => buildPersonCard(name, givenByPerson[name])).join('');
  }

  document.getElementById('purch-proxy-content').innerHTML = html;
}

function navToPurchase(purchId) {
  S.purchSubTab = 'list';
  nav('purch');
  setTimeout(() => {
    const p = (DB.purchases||[]).find(x => x.id === purchId);
    if (!p) return;
    document.getElementById('modal-detail-title').textContent = storeName(p.storeId) + ' 구매 상세';
    document.getElementById('modal-detail-body').innerHTML = renderPurchCard(p);
    document.getElementById('modal-detail-foot').innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('modal-detail')">닫기</button>

function renderPurchCard(p) {
  const store = DB.stores?.find(s => s.id === p.storeId);
  const cat = store ? getCat(store.categoryId) : null;
  const total = calcPurchTotal(p);
  const proxyTotal = calcProxyTotal(p);
  const myTotal = total - proxyTotal;
  const ovs = store ? isOvs(store) : false;
  const cur = store ? getStoreCur(store) : 'KRW';

  const STATUS_STEPS = ['unpurchased', 'waiting', 'ordered', 'shipped', 'delivered'];
  const statusAlias = { planned: 'unpurchased', preparing: 'shipped' };
  const mappedStatus = statusAlias[p.status] || p.status || 'unpurchased';
  const stepIdx = STATUS_STEPS.indexOf(mappedStatus);

  const itemsHtml = (p.items || []).map(it => {
    const alb = DB.albumTypes?.find(a => a.key === it.albKey);
    const pr = it.unitPrice > 0 ? it.unitPrice : (store ? storePrice(store, it.albKey) : 0);
    return `<tr>
      <td>${alb?.name || it.albKey}</td>
      <td>${it.qty || 0}장</td>
      <td>${pr ? (ovs ? (COUNTRIES[store.country]?.cur?.slice(0,2) || '') + Number(pr).toLocaleString() : fKRW(pr * (it.qty || 0))) : '—'}</td>
      ${(it.proxyDetails?.length)
        ? `<td style="padding:4px 6px">${it.proxyDetails.map((e,ei) => `
            <div style="display:flex;align-items:center;gap:4px;font-size:11px;margin-bottom:2px">
              <span style="color:var(--warn);font-weight:600">${e.name||'?'} ${e.qty}장</span>
              <button class="btn btn-xs" style="padding:1px 4px;font-size:9px;background:${e.paid?'rgba(52,211,153,.15)':'rgba(248,113,113,.15)'};color:${e.paid?'var(--ok)':'var(--err)'};border-color:${e.paid?'var(--ok)':'var(--err)'}"
                onclick="event.stopPropagation();toggleProxyPaid('${p.id}','${it.albKey}',${ei})">${e.paid?'입금✓':'입금?'}</button>
              <button class="btn btn-xs" style="padding:1px 4px;font-size:9px;background:${e.delivered?'rgba(52,211,153,.15)':'var(--sur2)'};color:${e.delivered?'var(--ok)':'var(--tx3)'};border-color:${e.delivered?'var(--ok)':'var(--bd)'}"
                onclick="event.stopPropagation();toggleProxyDelivered('${p.id}','${it.albKey}',${ei})">${e.delivered?'배송✓':'배송'}</button>
            </div>`).join('')}</td>`
        : it.proxyQty ? `<td class="text-warn" style="font-size:12px">${it.proxyQty}장</td>` : '<td style="color:var(--tx3);font-size:12px">-</td>'}
    </tr>`;
  }).join('');

  const delivSteps = p.status === 'cancelled' ? '' : `
    <div class="delivery-steps" style="margin:10px 0">
      ${STATUS_STEPS.map((st, i) => {
        const done = stepIdx > i;
        const current = stepIdx === i;
        return `<div class="delivery-step ${done ? 'done' : current ? 'current' : ''}" style="cursor:pointer" onclick="setPurchStatus('${p.id}','${st}')" title="${STATUS_MAP[st]?.lb||st}으로 변경">
          <div class="delivery-dot"></div>
          <div class="delivery-label">${STATUS_MAP[st]?.lb||st}</div>
        </div>`;
      }).join('')}
    </div>`;

  return `<div class="purch-card">
    <div class="purch-card-header">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
          <div class="purch-store-name" style="min-width:0">${store?.name || '?'} ${store?.isMusicStreamTeam ? '<span class="music-tag">🎵음총</span>' : ''} ${store?.hanteoChart ? '<span style="font-size:10px;background:rgba(96,165,250,.15);color:var(--info);padding:1px 5px;border-radius:3px">한터</span>' : ''}</div>
          <div class="flex gap-8" style="align-items:center;flex-shrink:0">
            <button class="btn btn-ghost btn-xs" onclick="viewPurchDetail('${p.id}')">상세</button>
            <button class="btn btn-ghost btn-xs" onclick="editPurch('${p.id}')">편집</button>
            <button class="btn btn-err btn-xs" onclick="deletePurch('${p.id}')">삭제</button>
          </div>
        </div>
        <div class="purch-meta">
          ${cat ? cat.name + ' · ' : ''}
          주문 ${p.orderDate ? fDate(p.orderDate) : '날짜미입력'}
          ${p.orderNumber ? `· <span class="mono text-xs">#${p.orderNumber}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          ${stBadge(p.status || 'waiting')}
          <div class="price-total" style="font-size:15px">${fKRW(total)}</div>
          ${proxyTotal ? `<div class="text-xs text-muted">내 지출: ${fKRW(myTotal)}</div>` : ''}
        </div>
      </div>
    </div>

    ${delivSteps}

    <table class="purch-items-table" style="width:100%;border-collapse:collapse;margin-bottom:8px">
      <thead><tr style="background:var(--sur2)">
        <th style="padding:5px 8px;font-size:11px;text-align:left">앨범</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left">수량</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left">금액</th>
        <th style="padding:5px 8px;font-size:11px;text-align:left">대리구매</th>
      </tr></thead>
      <tbody>${itemsHtml}</tbody>
    </table>

    ${(p.domShip || p.intlShip || p.fwdFee || p.customs || p.discount) ? `
      <div style="font-size:12px;color:var(--tx2);display:flex;gap:12px;flex-wrap:wrap">
        ${p.domShip ? `<span>국내배송 +${fKRW(p.domShip)}</span>` : ''}
        ${p.intlShip ? `<span>국제배송 +${fKRW(p.intlShip)}</span>` : ''}
        ${p.fwdFee ? `<span>포워딩 +${fKRW(p.fwdFee)}</span>` : ''}
        ${p.customs ? `<span>관세 +${fKRW(p.customs)}</span>` : ''}
        ${p.discount ? `<span class="text-ok">할인 -${fKRW(p.discount)}</span>` : ''}
      </div>
    ` : ''}

    ${p.trackingNumber ? `
      <div style="margin-top:8px;font-size:12px">
        📦 ${p.carrier || '택배'}: ${(() => {
          const url = carrierTrackUrl(p.carrier, p.trackingNumber);
          return url
            ? `<a href="${url}" target="_blank" style="color:var(--pk)"><code>${p.trackingNumber}</code> 조회↗</a>`
            : `<code>${p.trackingNumber}</code>`;
        })()}
        ${p.shippedAt ? ` · 발송 ${fDate(p.shippedAt)}` : ''}
        ${p.deliveredAt ? ` · 수령 ${fDate(p.deliveredAt)}` : ''}
      </div>
    ` : ''}

    ${p.memo ? `<div style="margin-top:8px;font-size:12px;color:var(--tx2);white-space:pre-wrap">${p.memo}</div>` : ''}
  </div>`;
}

function setPurchStatus(id, status) {
  const patch = { status };
  if (status === 'delivered') patch.deliveredAt = patch.deliveredAt || new Date().toISOString().slice(0,10);
  if (status === 'shipped') patch.shippedAt = patch.shippedAt || new Date().toISOString().slice(0,10);
  dbUpdateItem('purchases', id, patch);
  render();
  toast('상태 업데이트: ' + STATUS_MAP[status].lb);
}

function deletePurch(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  dbDeleteItem('purchases', id);
  render();
  toast('삭제되었습니다.', 'warn');
}

// CARRIERS
// ═══════════════════════════════════════════
const CARRIERS = [
  { name: 'CJ대한통운', url: 'https://www.cjlogistics.com/ko/tool/parcel/tracking?gnbInvcNo={no}' },
  { name: '한진택배',   url: 'https://www.hanjin.co.kr/kor/CMS/DeliveryMgr/WaybillResult.do?mCode=MN038&wblnumText2={no}' },
  { name: '롯데택배',   url: 'https://www.lotteglogis.com/home/reservation/tracking/linkView?InvNo={no}' },
  { name: '우체국택배', url: 'https://service.epost.go.kr/trace.RetrieveDomRfndReason.comm?sid1={no}' },
  { name: 'EMS',       url: 'https://service.epost.go.kr/trace.RetrieveEMSRDetail.comm?POST_CODE={no}' },
  { name: 'DHL',       url: 'https://www.dhl.com/kr-ko/home/tracking.html?tracking-id={no}' },
  { name: 'FedEx',     url: 'https://www.fedex.com/fedextrack/?trknbr={no}' },
  { name: 'UPS',       url: 'https://www.ups.com/track?tracknum={no}' },
  { name: '기타',       url: null },
];

function carrierTrackUrl(carrierName, trackNo) {
  if (!carrierName || !trackNo) return null;
  const c = CARRIERS.find(x => x.name === carrierName);
  if (!c || !c.url) return null;
  return c.url.replace('{no}', encodeURIComponent(trackNo));
}

function updateCarrierLink() {
  const carrier = document.getElementById('mp-carrier-sel')?.value || '';
  const trackNo = document.getElementById('mp-tracking')?.value || '';
  const link = document.getElementById('mp-track-link');
  const url = carrierTrackUrl(carrier, trackNo);
  if (link) { link.href = url || '#'; link.style.display = url ? 'inline' : 'none'; }
}

function _toggleProxyNewBtn(field, idx) {
  const cb = document.getElementById('pn-' + field + '-' + idx);
  if (!cb) return;
  cb.checked = !cb.checked;
  const btn = document.getElementById('pn-' + field + '-btn-' + idx);
  if (btn) {
    const active = cb.checked;
    btn.className = 'btn btn-xs ' + (active ? 'btn-ok' : 'btn-ghost');
    btn.textContent = field === 'paid' ? (active ? '✓입금' : '입금') : (active ? '✓배송' : '배송');
  }
}

function addProxyEntryNew(albKey, name, qty, paid, delivered, type) {
  window._proxyNewCounter = window._proxyNewCounter || 0;
  const idx = window._proxyNewCounter++;
  const storeId = document.getElementById('mp-store')?.value || S.storeFromId || S.editStoreId;
  const store = DB.stores?.find(s => s.id === storeId);
  const albums = store ? (DB.albumTypes||[]).filter(a => a.categoryId === store.categoryId) : (DB.albumTypes || []);
  const container = document.getElementById('mp-proxy-entries');
  if (!container) return;
  const div = document.createElement('div');
  div.id = 'proxy-new-' + idx;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1.5fr 52px auto auto 28px;gap:4px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)';
  div.innerHTML = `
    <select id="pn-alb-${idx}" style="font-size:12px" onchange="updateProxyTotals()">
      ${albums.map(a => `<option value="${a.key}" ${(albKey===a.key)?'selected':''}>${a.name}</option>`).join('')}
    </select>
    <select id="pn-type-${idx}" style="font-size:11px">
      <option value="receive" ${(type!=='give')?'selected':''}>받는것</option>
      <option value="give" ${(type==='give')?'selected':''}>해주는것</option>
    </select>
    <input id="pn-name-${idx}" type="text" placeholder="이름" style="font-size:12px" value="${name||''}">
    <input id="pn-qty-${idx}" type="number" min="0" style="font-size:12px" placeholder="수" value="${qty||''}" oninput="updateProxyTotals()">
    <button type="button" class="btn btn-xs ${paid?'btn-ok':'btn-ghost'}" id="pn-paid-btn-${idx}" onclick="_toggleProxyNewBtn('paid',${idx})">${paid?'✓입금':'입금'}</button>
    <button type="button" class="btn btn-xs ${delivered?'btn-ok':'btn-ghost'}" id="pn-deliv-btn-${idx}" onclick="_toggleProxyNewBtn('deliv',${idx})">${delivered?'✓배송':'배송'}</button>
    <button type="button" class="btn btn-err btn-xs" onclick="removeProxyEntryNew(${idx})">✕</button>
    <input type="checkbox" id="pn-paid-${idx}" ${paid?'checked':''} style="display:none">
    <input type="checkbox" id="pn-deliv-${idx}" ${delivered?'checked':''} style="display:none">
  `;
  container.appendChild(div);
}

function removeProxyEntryNew(idx) {
  const el = document.getElementById('proxy-new-' + idx);
  if (el) el.remove();
  updateProxyTotals();
}

function updateProxyTotals() {
  const counter = window._proxyNewCounter || 0;
  const proxyMap = {};
  for (let i = 0; i < counter; i++) {
    const qtyEl = document.getElementById('pn-qty-' + i);
    const albEl = document.getElementById('pn-alb-' + i);
    if (!qtyEl || !albEl || !document.getElementById('proxy-new-' + i)) continue;
    const qty = parseInt(qtyEl.value) || 0;
    const key = albEl.value;
    if (qty) proxyMap[key] = (proxyMap[key] || 0) + qty;
  }
  (DB.albumTypes || []).forEach(a => {
    const el = document.getElementById('item-proxy-sum-' + a.key);
    if (el) el.textContent = proxyMap[a.key] ? `대리 ${proxyMap[a.key]}장` : '';
  });
  updatePurchTotal();
}
